<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClaimsBench</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1923;--bg2:#162030;--bg3:#1c2a3e;--bg4:#223048;--bg5:#28395a;
--bdr:#2a3f5f;--bdr2:#35507a;
--blue:#3b82f6;--blue-d:rgba(59,130,246,0.15);
--gold:#d4a843;--gold-d:rgba(212,168,67,0.15);
--teal:#14b8a6;--teal-d:rgba(20,184,166,0.14);
--red:#ef4444;--red-d:rgba(239,68,68,0.13);
--amber:#f59e0b;--amber-d:rgba(245,158,11,0.14);
--green:#10b981;--green-d:rgba(16,185,129,0.13);
--purple:#a78bfa;--purple-d:rgba(167,139,250,0.13);
--t1:#e8eeff;--t2:#8fa3c0;--t3:#4a6080;
--r:7px;--rl:11px;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.logo{padding:14px 12px 11px;border-bottom:1px solid var(--bdr)}
.logo-name{font-size:15px;font-weight:600;color:var(--t1)}
.logo-sub{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.snav{flex:1;padding:8px 6px}
.nsec{margin-bottom:16px}
.nlbl{font-size:10px;color:var(--t3);letter-spacing:1.3px;text-transform:uppercase;padding:0 6px;margin-bottom:3px}
.ni{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;transition:all .12s;margin-bottom:1px;border:1px solid transparent;background:none;width:100%;text-align:left;font-family:inherit}
.ni:hover{background:var(--bg3);color:var(--t1)}.ni.on{background:var(--blue-d);color:var(--blue);border-color:rgba(59,130,246,.2)}
.nbadge{margin-left:auto;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:500;background:var(--blue);color:#fff}
.nbadge.a{background:var(--amber)}.nbadge.r{background:var(--red)}
.sfooter{padding:10px 8px;border-top:1px solid var(--bdr)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0 16px;min-height:48px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.tb-title{font-size:14px;font-weight:600;color:var(--t1)}
.tb-right{margin-left:auto;display:flex;gap:6px}
.content{padding:16px;flex:1}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:none;color:var(--t2);font-family:inherit;transition:all .12s}
.btn:hover{background:var(--bg3);color:var(--t1)}.btn.p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.p:hover{opacity:.88}
.btn.sm{padding:3px 8px;font-size:11px}.btn.danger{color:var(--red);border-color:rgba(239,68,68,.3);background:var(--red-d)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sc{background:var(--bg3);border-radius:var(--r);padding:11px 13px;border:1px solid var(--bdr)}
.sc-l{font-size:11px;color:var(--t3);margin-bottom:4px}.sc-v{font-size:22px;font-weight:300;font-family:monospace;color:var(--t1);line-height:1}.sc-s{font-size:11px;color:var(--t3);margin-top:2px}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:12px}
.ch{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ch-t{font-size:12px;font-weight:600;color:var(--t1)}.cb{padding:12px 13px}
.arow{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid rgba(42,63,96,.4);cursor:pointer;transition:background .1s}
.arow:last-child{border-bottom:none}.arow:hover{background:var(--bg4)}
.aref{font-family:monospace;font-size:11px;color:var(--blue);min-width:84px}
.aname{font-size:12px;color:var(--t1)}.ameta{font-size:11px;color:var(--t3)}
.achip{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}
.chip-u{background:var(--red-d);color:var(--red)}.chip-p{background:var(--amber-d);color:var(--amber)}.chip-n{background:var(--blue-d);color:var(--blue)}
.pbadge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500}
.pb-a{background:var(--amber-d);color:var(--amber)}.pb-b{background:var(--blue-d);color:var(--blue)}.pb-r{background:var(--red-d);color:var(--red)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500}
.pill::before{content:'';width:5px;height:5px;border-radius:50%}
.pill-o{background:var(--green-d);color:var(--green)}.pill-o::before{background:var(--green)}
.pill-c{background:rgba(74,96,128,.2);color:var(--t3)}.pill-c::before{background:var(--t3)}
.pill-r{background:var(--amber-d);color:var(--amber)}.pill-r::before{background:var(--amber)}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.tag-l{background:var(--gold-d);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.tag-c{background:var(--blue-d);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.tag-m{background:var(--teal-d);color:var(--teal);border:1px solid rgba(20,184,166,.2)}
.rag{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rag-g{background:#22c55e}.rag-a{background:var(--amber)}.rag-r{background:var(--red)}
.ctable{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.crow{display:grid;grid-template-columns:108px 1fr 88px 88px 80px 60px 55px;align-items:center;border-bottom:1px solid rgba(42,63,96,.3);cursor:pointer;transition:background .1s}
.crow:last-child{border-bottom:none}.crow:hover{background:var(--bg4)}.crow.hdr{cursor:default;background:var(--bg2)}.crow.hdr:hover{background:var(--bg2)}
.ctd{padding:9px 10px;font-size:12px}
.cref{font-family:monospace;font-size:11px;color:var(--blue)}.cref2{font-size:10px;color:var(--t3);font-family:monospace}
.cth{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.ftabs{display:flex;gap:3px;margin-bottom:11px;flex-wrap:wrap}
.ftab{padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer;color:var(--t2);border:1px solid transparent;transition:all .1s;background:none;font-family:inherit}
.ftab.on{background:var(--blue-d);color:var(--blue);border-color:rgba(59,130,246,.28)}.ftab:hover:not(.on){color:var(--t1)}
.rtabs{display:flex;gap:1px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.rtab{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.rtab.on{color:var(--blue);border-bottom-color:var(--blue)}.rtab:hover:not(.on){color:var(--t1)}
.fi{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:7px 9px;color:var(--t1);font-family:inherit;font-size:12px;width:100%}
.fi:focus{outline:none;border-color:var(--blue)}
textarea.fi{resize:vertical;min-height:65px}
select.fi{cursor:pointer}
.fl{font-size:11px;color:var(--t3);margin-bottom:3px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.info2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.if-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.if-v{font-size:12px;color:var(--t1)}.if-mono{font-family:monospace;color:var(--blue)}
.ctog{display:flex;gap:3px}
.ctb{padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--t2);background:none;border:1px solid var(--bdr);font-family:inherit;transition:all .12s}
.ctb.on{background:var(--blue-d);color:var(--blue);border-color:rgba(59,130,246,.35)}
.ms-card{background:var(--bg4);border-radius:var(--r);padding:11px 12px}
.ms-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ms-v{font-size:18px;font-weight:300;font-family:monospace;line-height:1}
.ms-s{font-size:11px;color:var(--t3);margin-top:2px}
.ms-bd{margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr)}
.ms-r{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--t2)}
.ms-r span:last-child{font-family:monospace;color:var(--t1)}
.note{background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:7px}
.note.ecf-src{border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0}
.nm{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.na{font-size:11px;color:var(--blue)}.nt{font-size:10px;color:var(--t3);font-family:monospace}
.nsrc{font-size:10px;padding:2px 5px;border-radius:3px;margin-left:auto}
.ns-e{background:var(--gold-d);color:var(--gold)}.ns-m{background:var(--blue-d);color:var(--blue)}.ns-t{background:var(--purple-d);color:var(--purple)}
.nb{font-size:12px;color:var(--t1);line-height:1.5}.ntask{font-size:10px;color:var(--purple);margin-top:4px}
.msg-row{display:grid;grid-template-columns:160px 1fr 70px 90px;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:5px}
.ror-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--red-d);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);margin-bottom:10px;font-size:12px;color:var(--red)}
.banner{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 15px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:12px}
.b-ref{font-family:monospace;font-size:14px;color:var(--blue);font-weight:500}
.notif{display:none;padding:8px 12px;background:var(--bg3);border:1px solid var(--green);border-radius:var(--r);font-size:12px;color:var(--green);margin-bottom:10px}
.ai-banner{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.25);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.ai-label{font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ai-text{font-size:12px;color:var(--t1);line-height:1.6}
.ai-thinking{font-size:12px;color:var(--t2);font-style:italic}
.reserve-suggest{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);border-radius:var(--r);padding:12px 14px;margin-top:10px}
.rs-header{font-size:12px;font-weight:600;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rs-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(167,139,250,.15);color:var(--t2)}
.rs-row:last-child{border-bottom:none}
.rs-row span:last-child{font-family:monospace;color:var(--t1)}
.doc-drop{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:28px 16px;text-align:center;cursor:pointer;transition:all .13s;background:var(--bg3);margin-bottom:12px}
.doc-drop:hover,.doc-drop.drag-over{border-color:var(--blue);background:var(--blue-d)}
.doc-preview{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.doc-preview-header{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.doc-preview-body{padding:16px;min-height:200px;font-size:12px;color:var(--t2);font-family:monospace;line-height:1.7;white-space:pre-wrap}
.idp-update{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.idp-update-hdr{font-size:12px;font-weight:600;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.idp-field-row{display:grid;grid-template-columns:120px 1fr 1fr;gap:8px;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(245,158,11,.12);align-items:center}
.idp-field-row:last-child{border-bottom:none}
.idp-old{color:var(--t3);text-decoration:line-through}.idp-new{color:var(--green);font-weight:500}
.stale-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--red);margin-top:8px;display:flex;align-items:flex-start;gap:6px}
.tl-hz{overflow-x:auto;margin-bottom:16px}
.tl-hz-inner{display:flex;align-items:flex-start;gap:0;width:100%;padding:16px 0}
.tl-step{display:flex;flex-direction:column;align-items:center;position:relative;flex:1;min-width:80px}
.tl-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:calc(50% + 16px);right:calc(-50% + 16px);width:auto;height:2px;background:var(--bdr);z-index:0}
.tl-step.done:not(:last-child)::after{background:var(--green)}
.tl-step.active:not(:last-child)::after{background:var(--bdr)}
.tl-dot-hz{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bdr);background:var(--bg3);color:var(--t3);z-index:1;position:relative;cursor:pointer;transition:all .12s}
.tl-step.done .tl-dot-hz{background:var(--green);border-color:var(--green);color:#fff}
.tl-step.active .tl-dot-hz{background:var(--blue);border-color:var(--blue);color:#fff}
.tl-step-label{font-size:10px;color:var(--t3);margin-top:6px;text-align:center;max-width:110px}
.tl-step.done .tl-step-label{color:var(--green)}.tl-step.active .tl-step-label{color:var(--blue)}
.tl-step-date{font-size:9px;color:var(--t3);font-family:monospace;margin-top:2px;text-align:center}
.tl-step-tasks{margin-top:8px;display:none;background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--r);padding:8px;min-width:200px;max-width:250px}
.tl-step-tasks.open{display:block}
.tl-task-item{font-size:11px;color:var(--t2);padding:3px 0;border-bottom:1px solid rgba(42,63,96,.3);display:flex;align-items:flex-start;gap:5px}
.tl-task-item:last-child{border-bottom:none}
.tl-task-who{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.mvt-row-wrap{border-bottom:1px solid rgba(42,63,96,.25)}
.mvt-row-wrap:last-child{border-bottom:none}
.mvt-row{display:grid;grid-template-columns:90px 70px 80px 1fr 90px 90px 90px 55px 60px;align-items:center;cursor:pointer;transition:background .1s;padding:8px 9px}
.mvt-row:hover{background:var(--bg4)}.mvt-row.expanded{background:var(--bg4)}
.mvt-expand{display:none;background:var(--bg5);border-top:1px solid var(--bdr);padding:14px 14px 14px 24px}
.mvt-expand.open{display:block}
.mvt-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.mvt-detail-card{background:var(--bg4);border-radius:var(--r);padding:9px 11px;border:1px solid var(--bdr)}
.mvt-dc-l{font-size:10px;color:var(--t3);margin-bottom:3px}.mvt-dc-v{font-size:13px;color:var(--t1);font-family:monospace}
.bureau-msg-viewer{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;font-family:monospace;font-size:11px;color:var(--t2);line-height:1.6;margin-top:10px;white-space:pre-wrap}
.mvt-chip{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:500;white-space:nowrap}
.mv-pay{background:var(--green-d);color:var(--green)}.mv-res{background:var(--amber-d);color:var(--amber)}.mv-bur{background:var(--gold-d);color:var(--gold)}
.mn{font-family:monospace;font-size:11px}
.mp{color:var(--green)}.mng{color:var(--red)}.m0{color:var(--t3)}
.alog{display:grid;grid-template-columns:120px 52px 1fr;gap:6px;padding:5px 9px;font-size:11px;border-radius:5px}
.alog:nth-child(odd){background:var(--bg4)}
.a-t{color:var(--t3);font-family:monospace}.a-u{color:var(--blue)}.a-a{color:var(--t2)}
.flag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.flag{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid}
.flag-g{background:var(--green-d);color:var(--green);border-color:rgba(16,185,129,.28)}
.flag-a{background:var(--amber-d);color:var(--amber);border-color:rgba(245,158,11,.28)}
.flag-r{background:var(--red-d);color:var(--red);border-color:rgba(239,68,68,.28)}
.flag-n{background:rgba(74,96,128,.15);color:var(--t2);border-color:var(--bdr)}
.qa{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;transition:all .12s;border:1px solid transparent;margin-bottom:3px;background:none;width:100%;text-align:left;font-family:inherit}
.qa:hover{background:var(--bg4);color:var(--t1);border-color:var(--bdr)}
.qa.p{color:var(--t2)}.qa.d{color:var(--t2)}
.tp{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg4);border-radius:var(--r);margin-bottom:5px}
.tp-av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ecf-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(42,63,96,.35)}
.ecf-row:last-child{border-bottom:none}
.ecf-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ecf-t{font-size:11px;font-weight:600;color:var(--t1)}.ecf-m{font-size:10px;color:var(--t3);font-family:monospace}.ecf-mv{font-size:11px;color:var(--t2)}
.ecs{font-size:10px;padding:2px 5px;border-radius:3px;margin-left:auto;flex-shrink:0;align-self:flex-start}
.ecs-a{background:var(--amber-d);color:var(--amber)}.ecs-d{background:var(--green-d);color:var(--green)}.ecs-i{background:var(--blue-d);color:var(--blue)}
.ecf-mvt-block{border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ecf-mvt-header{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;transition:background .1s;background:var(--bg4)}
.ecf-mvt-header:hover{background:var(--bg5)}
.ecf-mvt-header.expanded{background:var(--bg5);border-bottom:1px solid var(--bdr)}
.ecf-mvt-id{font-family:monospace;font-size:11px;color:var(--blue);min-width:28px}
.ecf-mvt-desc{flex:1;font-size:12px;color:var(--t1)}
.ecf-mvt-date{font-size:10px;color:var(--t3);font-family:monospace}
.ecf-status-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.ecf-expand-icon{font-size:10px;color:var(--t3);margin-left:4px}
.ecf-msg-list{display:none;background:var(--bg3);overflow-x:auto}
.ecf-msg-list.open{display:block}
.ecf-msg-item{display:grid;grid-template-columns:72px 90px 110px 1fr 130px;gap:8px;align-items:start;padding:9px 12px;border-bottom:1px solid rgba(42,63,96,.25);font-size:11px;min-width:0}
.ecf-msg-item:last-child{border-bottom:none}
.ecf-msg-type{font-weight:600;color:var(--t1)}
.ecf-msg-from{color:var(--t3)}
.ecf-msg-detail{color:var(--t2);line-height:1.5;min-width:0;overflow:hidden}

.doc-list-item:last-child{border-bottom:none}.doc-list-item:hover{background:var(--bg4)}.doc-list-item.selected{background:var(--bg4);border-left:3px solid var(--blue);border-radius:0}
.modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:50;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;width:500px;max-width:90vw}
.modal-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

@keyframes taskFlash{
  0%{background:rgba(16,185,129,0.28);box-shadow:0 0 0 3px rgba(16,185,129,0.18);}
  55%{background:rgba(16,185,129,0.10);box-shadow:0 0 0 1px rgba(16,185,129,0.06);}
  100%{background:transparent;box-shadow:none;}
}
.tl-task-flash{animation:taskFlash 2.4s ease-out forwards;border-radius:4px;}
@keyframes oaGlow{
  0%{box-shadow:0 0 0 3px rgba(16,185,129,0.5);}
  70%{box-shadow:0 0 0 2px rgba(16,185,129,0.15);}
  100%{box-shadow:none;}
}
.oa-glow{animation:oaGlow 1.8s ease-out forwards;}

function authQueueRow(claimId,mvt,ins,desc,type,cur,amount,user,role,since,overdue){
  var typeMap={lloyds:'tag-l',companies:'tag-c',manual:'tag-m'};
  var typeLabel={lloyds:"Lloyd's",companies:'Cos',manual:'Manual'};
  // Parse since date to get days waiting
  var sinceDate=new Date(since.split(' ').reverse().join(' '));
  var daysWaiting=Math.round((new Date('2025-05-29')-sinceDate)/(1000*60*60*24));
  var isOverdue=overdue||daysWaiting>7;
  return '<div style="display:grid;grid-template-columns:110px 1fr 80px 100px 1fr 160px;gap:12px;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(42,63,96,.3);'+(isOverdue?'border-left:3px solid var(--amber);background:rgba(245,158,11,0.03);':'')+'" onclick="openClaim(\''+claimId+'\');" onmouseover="this.style.background=\'var(--bg4)\'" onmouseout="this.style.background=\''+( isOverdue?'rgba(245,158,11,0.03)':'')+'\'" style="cursor:pointer;transition:background .1s">'+
    '<div>'+
      '<div style="font-family:monospace;font-size:11px;color:var(--blue)">'+claimId+'</div>'+
      '<div style="font-family:monospace;font-size:10px;color:var(--t3);margin-top:1px">'+mvt+'</div>'+
    '</div>'+
    '<div>'+
      '<div style="font-size:12px;color:var(--t1);font-weight:500">'+ins+'</div>'+
      '<div style="font-size:11px;color:var(--t3);margin-top:1px">'+desc+'</div>'+
    '</div>'+
    '<div><span class="tag '+typeMap[type]+'" style="font-size:10px">'+typeLabel[type]+'</span></div>'+
    '<div style="text-align:right;font-family:monospace;font-size:12px;font-weight:600;color:var(--t1)">'+cur+' '+amount+'</div>'+
    '<div>'+
      '<div style="font-size:11px;color:var(--t1);font-weight:500">'+user+'</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+role+'</div>'+
      '<div style="font-size:10px;color:'+(isOverdue?'var(--amber)':'var(--t3)')+';margin-top:1px">'+(isOverdue?'&#x26A0; ':'')+''+daysWaiting+' day'+(daysWaiting!==1?'s':'')+' waiting</div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:7px" onclick="event.stopPropagation()">'+
      (isOverdue?
        '<button class="btn sm" style="font-size:11px;color:var(--amber);border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08)" onclick="notify(\'Chaser sent to '+user+' re '+claimId+' '+mvt+'\')">Send chaser</button>':
        '<span style="font-size:11px;color:var(--t3)">Within SLA</span>')+
    '</div>'+
  '</div>';

function simFNOLIdp(){
  var result=document.getElementById('fnol-idp-result');
  if(!result)return;
  result.innerHTML='<div style="font-size:12px;color:var(--t2);padding:8px 0">&#x1F50D; Analysing document...</div>';
  setTimeout(function(){
    // Pre-fill form fields
    var ins=document.getElementById('fi-ins');
    var ref=document.getElementById('fi-ref');
    var brk=document.getElementById('fi-brk');
    var val=document.getElementById('fi-val');
    var desc=document.getElementById('fi-desc');
    var dol=document.getElementById('fi-dol');
    if(ins&&!ins.value) ins.value='Meridian Shipping Ltd';
    if(ref&&!ref.value) ref.value='B0112LX4441';
    if(brk&&!brk.value) brk.value='Lockton Companies LLP';
    if(val&&!val.value) val.value='478200';
    if(dol&&!dol.value) dol.value='2025-01-14';
    if(desc&&!desc.value) desc.value='Cargo vessel sustained significant water damage during transit. Water ingress to holds 3 and 4. 847 tonnes of grain affected.';

    // Add doc to attached list
    simFNOLDocAttach('FNOL_Document.pdf');

    // Show extraction summary
    result.innerHTML='<div style="background:var(--green-d);border:1px solid rgba(16,185,129,.3);border-radius:var(--r);padding:10px 12px">'+
      '<div style="font-size:12px;font-weight:500;color:var(--green);margin-bottom:7px">&#x2705; IDP extracted — fields pre-populated</div>'+
      '<div style="display:flex;flex-direction:column;gap:4px">'+
        fnolExtractedField('Insured','Meridian Shipping Ltd')+
        fnolExtractedField('Policy ref','B0112LX4441')+
        fnolExtractedField('Broker','Lockton Companies LLP')+
        fnolExtractedField('Loss date','14 Jan 2025')+
        fnolExtractedField('Estimated loss','USD 478,200')+
        fnolExtractedField('Cause','Water ingress — holds 3 & 4')+
      '</div>'+
      '<div style="margin-top:8px;font-size:11px;color:var(--t3)">Review and amend any fields before creating the claim.</div>'+
    '</div>';
  },1400);
}

function simFNOLDocAttach(name){
  var list=document.getElementById('fnol-doc-list');
  if(!list)return;
  var docName=name||'Supporting_Document_'+( list.children.length+1)+'.pdf';

function eventsView(){
  var hasDupes=false;
  var allCodes={};
  CAT_CODES.forEach(function(c){c.events.forEach(function(e){if(allCodes[e.eventCode])hasDupes=true;allCodes[e.eventCode]=true;});});
  var awaitingEvent=Object.keys(MOVEMENT_CODES).reduce(function(arr,claimId){
    var mvts=MOVEMENT_CODES[claimId];
    Object.keys(mvts).forEach(function(mvtId){if(mvts[mvtId].catCode&&!mvts[mvtId].eventCode)arr.push({claimId:claimId,mvtId:mvtId,catCode:mvts[mvtId].catCode,note:mvts[mvtId].note});});
    return arr;
  },[]);
  var awaitingCat=Object.keys(MOVEMENT_CODES).reduce(function(arr,claimId){
    var mvts=MOVEMENT_CODES[claimId];
    Object.keys(mvts).forEach(function(mvtId){if(mvts[mvtId].awaiting)arr.push({claimId:claimId,mvtId:mvtId,note:mvts[mvtId].note});});
    return arr;
  },[]);

  var totalIncurred=CAT_CODES.reduce(function(s,c){return s+c.totalIncurred;},0);
  var totalFees=CAT_CODES.reduce(function(s,c){return s+c.totalFees;},0);

    (hasDupes?'<div class="sc" style="border-color:rgba(239,68,68,.4)"><div class="sc-l" style="color:var(--red)">&#x26A0; Duplicate codes detected</div><div class="sc-v" style="color:var(--red)">!</div><div class="sc-s" style="color:var(--red)">Requires review</div></div>':

  (awaitingCat.length?'<div style="background:var(--amber-d);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--amber)">'+

    awaitingCat.map(function(a){return '<span style="font-family:monospace;cursor:pointer;color:var(--blue)" onclick="openClaim(\''+a.claimId+'\')">'+a.claimId+'/'+a.mvtId+'</span>';}).join(', ')+
  '</div>':'')+

  '<div style="display:grid;grid-template-columns:1fr 300px;gap:14px">'+
  '<div>'+
    '<div class="card">'+
      '<div class="ch"><div class="ch-t">Cat / event code register</div>'+

              '<div class="sc" style="padding:8px 10px"><div class="sc-l">Claims coded</div><div style="font-size:15px;font-family:monospace;color:var(--t1)">'+cat.claims.length+'</div></div>'+
              '<div class="sc" style="padding:8px 10px"><div class="sc-l">Event codes</div><div style="font-size:15px;font-family:monospace;color:var(--t1)">'+cat.events.length+'</div></div>'+
            '</div>'+
            '<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px">Event codes under this cat</div>'+
            cat.events.map(function(ev,ei){
              var stCol=ev.status==='confirmed'?'#22c55e':'var(--amber)';
              var stBg=ev.status==='confirmed'?'var(--green-d)':'var(--amber-d)';
              return '<div style="display:grid;grid-template-columns:130px 1fr 1fr 80px;gap:10px;align-items:start;padding:8px 10px;background:var(--bg4);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:6px;cursor:pointer;transition:border-color .12s" onclick="openEventDetail('+ci+','+ei+')" onmouseover="this.style.borderColor=\'var(--blue)\'" onmouseout="this.style.borderColor=\'var(--bdr)\'">'+
                '<div><div style="font-family:monospace;font-size:11px;color:var(--blue);font-weight:500">'+ev.eventCode+'</div><div style="font-size:10px;color:var(--t3)">'+ev.dt+'</div></div>'+
                '<div style="font-size:12px;color:var(--t1)">'+ev.name+'</div>'+
                '<div style="font-size:10px;color:var(--t3)">Market codes:<br>'+ev.marketCodes.map(function(mc){return '<span style="font-family:monospace;color:var(--purple)">'+mc+'</span>';}).join('<br>')+'</div>'+
                '<div><span style="font-size:10px;padding:2px 6px;border-radius:3px;background:'+stBg+';color:'+stCol+'">'+ev.status+'</span></div>'+
              '</div>';
            }).join('')+
            (cat.claims.length?
              '<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin:10px 0 7px">Coded claims</div>'+
              '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
              cat.claims.map(function(cl){
                var mvtCodes=MOVEMENT_CODES[cl]?Object.keys(MOVEMENT_CODES[cl]).filter(function(m){return MOVEMENT_CODES[cl][m].catCode===cat.code;}):[]; 
                return '<div style="padding:6px 10px;background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer" onclick="openClaim(\''+cl+'\')\"">'+
                  '<div style="font-family:monospace;font-size:11px;color:var(--blue)">'+cl+'</div>'+
                  (mvtCodes.length?'<div style="font-size:10px;color:var(--t3)">Coded on: '+mvtCodes.join(', ')+'</div>':'')+
                '</div>';
              }).join('')+
              '</div>':'')+'</div>':'')+'</div>';
      }).join('')+
    '</div>'+
  '</div>'+
  '<div>'+
    '<div class="card"><div class="ch"><div class="ch-t">Awaiting event code from market</div><span class="pbadge pb-a">'+awaitingEvent.length+'</span></div>'+
    '<div class="cb" style="padding-top:6px;padding-bottom:6px">'+
    (awaitingEvent.length?awaitingEvent.map(function(a){
      return '<div style="padding:8px 10px;background:var(--bg4);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:6px">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
          '<span style="font-family:monospace;font-size:11px;color:var(--blue);cursor:pointer" onclick="openClaim(\''+a.claimId+'\')">'+a.claimId+'</span>'+
          '<span style="font-size:10px;color:var(--t3)">·</span>'+
          '<span style="font-family:monospace;font-size:11px;color:var(--t2)">'+a.mvtId+'</span>'+
          '<span style="font-size:10px;padding:2px 5px;border-radius:3px;background:var(--amber-d);color:var(--amber)">'+a.catCode+'</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--t3)">'+a.note+'</div>'+
        '<button class="btn sm" style="margin-top:6px;font-size:10px" onclick="notify(\'Chase sent to market\')" >Chase market</button>'+
      '</div>';
    }).join(''):'<div style="font-size:12px;color:var(--t3);text-align:center;padding:16px">All cat-coded movements have event codes.</div>')+
    '</div></div>'+
    '<div class="card" style="margin-top:0">'+
      '<div class="ch"><div class="ch-t">Latest market codes</div><div style="font-size:10px;color:var(--t3)">From LMA / Lloyd\'s registry</div></div>'+
      '<div class="cb" style="padding-top:6px;padding-bottom:6px">'+
      CAT_CODES.flatMap(function(c){return c.events;}).slice(0,5).map(function(ev){
        return '<div style="padding:6px 0;border-bottom:1px solid rgba(42,63,96,.25);font-size:11px">'+
          '<div style="display:flex;justify-content:space-between">'+
            '<span style="font-family:monospace;color:var(--blue)">'+ev.eventCode+'</span>'+
            '<span style="font-size:10px;padding:2px 5px;border-radius:3px;background:'+(ev.status==='confirmed'?'var(--green-d)':'var(--amber-d)')+';color:'+(ev.status==='confirmed'?'#22c55e':'var(--amber)')+'">'+ev.status+'</span>'+
          '</div>'+
          '<div style="color:var(--t2);margin-top:1px">'+ev.name+'</div>'+
        '</div>';
      }).join('')+
      '</div>'+
    '</div>'+
  '</div>'+
  '</div></div>';
}

function openEventDetail(catIdx,eventIdx){
  selectedCatCode=catIdx;
  selectedEventCode=eventIdx;
  document.getElementById('events-page').innerHTML=renderEventDetail(catIdx,eventIdx);
  // Render map after DOM update
  setTimeout(function(){renderEventMap(catIdx,eventIdx);},80);
}

function closeEventDetail(){
  selectedCatCode=null;selectedEventCode=null;
  document.getElementById('events-page').innerHTML=renderEventsContent();
}

function renderEventDetail(ci,ei){
  var cat=CAT_CODES[ci];
  var ev=cat.events[ei];
  var typeCol=cat.type==='cat'?'var(--red)':'var(--blue)';
  var typeBg=cat.type==='cat'?'var(--red-d)':'var(--blue-d)';
  var stCol=ev.status==='confirmed'?'#22c55e':'var(--amber)';
  var stBg=ev.status==='confirmed'?'var(--green-d)':'var(--amber-d)';

  // Compute financials from claimDetails
  var totalRes=cat.claimDetails.reduce(function(s,d){return s+d.res;},0);
  var totalPd=cat.claimDetails.reduce(function(s,d){return s+(d.paid||0);},0);
  var totalOut=totalRes-totalPd;

  return '<div>'+
  // Breadcrumb

    '<span>›</span>'+
    '<a style="color:var(--blue);cursor:pointer" onclick="closeEventDetail()">'+cat.code+' — '+cat.name+'</a>'+
    '<span>›</span>'+
    '<span style="color:var(--t1)">'+ev.eventCode+'</span>'+
  '</div>'+

  // Header banner
  '<div style="background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px">'+
    '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">'+
      '<div style="flex:1;min-width:200px">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'+
          '<span style="font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;background:'+typeBg+';color:'+typeCol+'">'+cat.type.toUpperCase()+'</span>'+
          '<span style="font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;background:'+stBg+';color:'+stCol+'">'+ev.status+'</span>'+
        '</div>'+
        '<div style="font-size:20px;font-weight:300;color:var(--t1);margin-bottom:3px">'+ev.name+'</div>'+
        '<div style="font-size:12px;color:var(--t2)">'+cat.code+' · '+ev.eventCode+' · '+ev.dt+'</div>'+
        '<div style="font-size:12px;color:var(--t3);margin-top:3px">'+cat.region+'</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;min-width:360px">'+
        '<div style="background:var(--bg4);border-radius:var(--r);padding:10px 12px;border:1px solid var(--bdr)">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Total incurred</div>'+
          '<div style="font-size:18px;font-weight:300;font-family:monospace;color:var(--amber)">'+cat.currency+' '+(cat.totalIncurred?cat.totalIncurred.toLocaleString():'0')+'</div>'+
          '<div style="font-size:10px;color:var(--t3);margin-top:2px">Reserve across coded claims</div>'+
        '</div>'+
        '<div style="background:var(--bg4);border-radius:var(--r);padding:10px 12px;border:1px solid var(--bdr)">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Paid to date</div>'+
          '<div style="font-size:18px;font-weight:300;font-family:monospace;color:var(--green)">'+cat.currency+' '+totalPd.toLocaleString()+'</div>'+
          '<div style="font-size:10px;color:var(--t3);margin-top:2px">Settled payments issued</div>'+
        '</div>'+
        '<div style="background:var(--bg4);border-radius:var(--r);padding:10px 12px;border:1px solid var(--bdr)">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Outstanding</div>'+
          '<div style="font-size:18px;font-weight:300;font-family:monospace;color:var(--red)">'+cat.currency+' '+totalOut.toLocaleString()+'</div>'+
          '<div style="font-size:10px;color:var(--t3);margin-top:2px">Reserve less paid</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>'+

  // Two-column layout: map left, codes right
  '<div style="display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:14px">'+

    // Map + description
    '<div>'+
      '<div class="card" style="margin-bottom:12px">'+
        '<div class="ch"><div class="ch-t">Event location</div><span style="font-size:11px;color:var(--t3)">'+cat.region+'</span></div>'+
        '<div id="event-map" style="height:280px;background:var(--bg2);border-radius:0 0 var(--rl) var(--rl);position:relative;overflow:hidden">'+
          '<div id="event-map-canvas" style="width:100%;height:100%"></div>'+
        '</div>'+
      '</div>'+
      '<div class="card">'+
        '<div class="ch"><div class="ch-t">Event description</div>'+
          '<div style="font-size:10px;color:var(--t3)">Source: '+cat.source+'</div>'+
        '</div>'+
        '<div class="cb">'+
          '<div style="font-size:12px;color:var(--t1);line-height:1.65;margin-bottom:10px">'+ev.description+'</div>'+
          (cat.industryLoss?'<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg4);border-radius:var(--r);border:1px solid var(--bdr)">'+
            '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Industry insured loss estimate</div>'+
            '<div style="font-size:13px;font-weight:500;color:var(--amber);margin-left:auto">'+cat.industryLoss+'</div>'+
          '</div>':'')+
        '</div>'+
      '</div>'+
    '</div>'+

    // Codes + claims sidebar
    '<div>'+
      // Market codes
      '<div class="card" style="margin-bottom:10px">'+
        '<div class="ch"><div class="ch-t">Market event codes</div></div>'+
        '<div class="cb" style="padding-top:6px;padding-bottom:6px">'+
          ev.marketCodes.map(function(mc){
            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,63,96,.25)">'+
              '<div style="width:7px;height:7px;border-radius:50%;background:var(--purple);flex-shrink:0"></div>'+
              '<span style="font-family:monospace;font-size:11px;color:var(--purple)">'+mc+'</span>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</div>'+

      // Client codes
      '<div class="card" style="margin-bottom:10px">'+
        '<div class="ch"><div class="ch-t">Client codes</div>'+
          '<span style="font-size:10px;color:var(--t3)">May differ from market codes</span>'+
        '</div>'+
        '<div class="cb" style="padding-top:6px;padding-bottom:6px">'+
          (cat.claimDetails.filter(function(d){return d.clientCode;}).length?

              return '<div style="padding:7px 9px;background:var(--bg4);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:5px">'+
                '<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">'+

                   '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:var(--green-d);color:#22c55e">Matches</span>')+
                '</div>'+
                '<div style="font-size:10px;color:var(--t3)">'+d.ins+' · '+d.id+'</div>'+
              '</div>';
            }).join(''):
            '<div style="font-size:12px;color:var(--t3);padding:6px 0">No client codes recorded against this event.</div>')+
        '</div>'+
      '</div>'+

      // Other events under same cat
      (cat.events.length>1?'<div class="card" style="margin-bottom:10px">'+
        '<div class="ch"><div class="ch-t">Other events — '+cat.code+'</div></div>'+
        '<div class="cb" style="padding-top:5px;padding-bottom:5px">'+
          cat.events.map(function(oe,oi){
            if(oi===ei)return'';
            return '<div style="padding:7px 9px;background:var(--bg4);border-radius:var(--r);border:1px solid var(--bdr);cursor:pointer;margin-bottom:5px" onclick="openEventDetail('+ci+','+oi+')">'+
              '<div style="font-family:monospace;font-size:11px;color:var(--blue)">'+oe.eventCode+'</div>'+
              '<div style="font-size:11px;color:var(--t2);margin-top:1px">'+oe.name+'</div>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</div>':'')+'</div>'+
  '</div>'+

  // Claims coded to this event - full table
  '<div class="card">'+
    '<div class="ch"><div class="ch-t">Claims coded to this event</div>'+
      '<span style="font-size:11px;color:var(--t2)">'+cat.claimDetails.length+' claim'+(cat.claimDetails.length!==1?'s':'')+' · '+cat.currency+' '+cat.totalIncurred.toLocaleString()+' total incurred</span>'+
    '</div>'+
    (cat.claimDetails.length?
      '<div style="overflow-x:auto">'+
        '<table style="width:100%;border-collapse:collapse;font-size:12px">'+
          '<thead><tr style="background:var(--bg2)">'+
            '<th style="padding:7px 11px;text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Claim ref</th>'+
            '<th style="padding:7px 11px;text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Insured</th>'+
            '<th style="padding:7px 11px;text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Class</th>'+
            '<th style="padding:7px 11px;text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Movement</th>'+
            '<th style="padding:7px 11px;text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Client code</th>'+
            '<th style="padding:7px 11px;text-align:right;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Reserve</th>'+
            '<th style="padding:7px 11px;text-align:right;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Paid to date</th>'+
            '<th style="padding:7px 11px;text-align:right;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">Outstanding</th>'+
          '</tr></thead>'+
          '<tbody>'+
          cat.claimDetails.map(function(d){
            var out=d.res-(d.paid||0);
            var codeMatch=d.clientCode&&d.clientCode===ev.marketCodes[0];
            return '<tr style="border-bottom:1px solid rgba(42,63,96,.25);cursor:pointer" onclick="openClaim(\''+d.id+'\')" onmouseover="this.style.background=\'var(--bg4)\'" onmouseout="this.style.background=\'\'">'+
              '<td style="padding:9px 11px;font-family:monospace;color:var(--blue)">'+d.id+'</td>'+
              '<td style="padding:9px 11px;color:var(--t1)">'+d.ins+'</td>'+
              '<td style="padding:9px 11px;color:var(--t2)">'+d.cls+'</td>'+
              '<td style="padding:9px 11px;font-family:monospace;font-size:11px;color:var(--t2)">'+d.mvt+'</td>'+
              '<td style="padding:9px 11px">'+
                (d.clientCode?
                  '<span style="font-family:monospace;font-size:11px;color:var(--teal)">'+d.clientCode+'</span>'+
                  (codeMatch?'':' <span style="font-size:10px;color:var(--amber)">&#x26A0;</span>'):
                  '<span style="font-size:11px;color:var(--t3)">Not set</span>')+
              '</td>'+
              '<td style="padding:9px 11px;text-align:right;font-family:monospace;color:var(--amber)">'+d.currency+' '+d.res.toLocaleString()+'</td>'+
              '<td style="padding:9px 11px;text-align:right;font-family:monospace;color:var(--green)">'+d.currency+' '+(d.paid||0).toLocaleString()+'</td>'+
              '<td style="padding:9px 11px;text-align:right;font-family:monospace;color:var(--red)">'+d.currency+' '+out.toLocaleString()+'</td>'+
            '</tr>';
          }).join('')+
          // Totals row
          '<tr style="background:var(--bg2);font-weight:600">'+
            '<td colspan="5" style="padding:8px 11px;font-size:11px;color:var(--t2)">TOTAL</td>'+
            '<td style="padding:8px 11px;text-align:right;font-family:monospace;color:var(--amber)">'+cat.currency+' '+totalRes.toLocaleString()+'</td>'+
            '<td style="padding:8px 11px;text-align:right;font-family:monospace;color:var(--green)">'+cat.currency+' '+totalPd.toLocaleString()+'</td>'+
            '<td style="padding:8px 11px;text-align:right;font-family:monospace;color:var(--red)">'+cat.currency+' '+totalOut.toLocaleString()+'</td>'+
          '</tr>'+
          '</tbody></table>'+
      '</div>':
      '<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">No claims currently coded to this event.</div>')+
  '</div>'+
  '</div>';
}

function renderEventMap(ci,ei){
  var cat=CAT_CODES[ci];
  var ev=cat.events[ei];
  var mapEl=document.getElementById('event-map-canvas');
  if(!mapEl)return;

  // Build an SVG world map approximation with a pin
  // Using a simple equirectangular projection
  var W=mapEl.offsetWidth||560,H=280;
  var lat=ev.lat||cat.lat||0,lng=ev.lng||cat.lng||0;

  // Convert lat/lng to SVG x/y (equirectangular)
  var px=Math.round((lng+180)/360*W);
  var py=Math.round((90-lat)/180*H);

  // Simple continent outlines as SVG paths (simplified)
  var continents=[
    // North America
    'M 60,60 L 80,55 L 120,50 L 140,60 L 145,80 L 130,110 L 110,130 L 90,140 L 70,130 L 60,110 Z',
    // South America
    'M 100,140 L 120,135 L 135,145 L 140,170 L 130,200 L 110,210 L 95,195 L 90,170 Z',
    // Europe
    'M 220,50 L 250,45 L 265,55 L 260,70 L 240,75 L 225,70 Z',
    // Africa
    'M 225,80 L 260,75 L 275,90 L 280,130 L 265,165 L 245,170 L 225,155 L 215,120 L 220,90 Z',
    // Asia
    'M 260,45 L 340,40 L 390,50 L 410,70 L 400,95 L 360,100 L 320,90 L 280,80 L 260,65 Z',
    // Australia
    'M 360,150 L 395,145 L 415,155 L 420,175 L 405,185 L 375,185 L 355,170 Z',
  ];

  var svgW=Math.round(W),svgH=Math.round(H);
  var pinX=Math.round(px),pinY=Math.round(py);
  var typeColor=cat.type==='cat'?'#ef4444':'#3b82f6';

  var svg='<svg viewBox="0 0 '+svgW+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">'+
    '<rect width="'+svgW+'" height="'+svgH+'" fill="#0f1923"/>'+
    // Grid lines
    '<line x1="0" y1="'+Math.round(H/2)+'" x2="'+svgW+'" y2="'+Math.round(H/2)+'" stroke="#2a3f5f" stroke-width="0.5" stroke-dasharray="4,4"/>'+
    '<line x1="'+Math.round(W/2)+'" y1="0" x2="'+Math.round(W/2)+'" y2="'+svgH+'" stroke="#2a3f5f" stroke-width="0.5" stroke-dasharray="4,4"/>'+
    // Ocean shade
    '<rect width="'+svgW+'" height="'+svgH+'" fill="rgba(59,130,246,0.04)"/>'+
    // Continents
    continents.map(function(d){
      return '<path d="'+d+'" fill="#1c2a3e" stroke="#2a3f5f" stroke-width="1"/>';
    }).join('')+
    // Pulse rings
    '<circle cx="'+pinX+'" cy="'+pinY+'" r="20" fill="none" stroke="'+typeColor+'" stroke-width="1.5" opacity="0.25"/>'+
    '<circle cx="'+pinX+'" cy="'+pinY+'" r="12" fill="none" stroke="'+typeColor+'" stroke-width="1.5" opacity="0.45"/>'+
    // Pin dot
    '<circle cx="'+pinX+'" cy="'+pinY+'" r="5" fill="'+typeColor+'" stroke="white" stroke-width="1.5"/>'+
    // Pin label
    '<rect x="'+(pinX+9)+'" y="'+(pinY-11)+'" width="'+(ev.name.length*5.2+10)+'" height="18" rx="3" fill="rgba(15,25,35,0.85)" stroke="'+typeColor+'" stroke-width="0.8"/>'+
    '<text x="'+(pinX+14)+'" y="'+(pinY+2)+'" font-size="9" fill="'+typeColor+'" font-family="monospace">'+ev.eventCode+'</text>'+
    // Coord label bottom right
    '<text x="'+(svgW-6)+'" y="'+(svgH-6)+'" font-size="9" fill="#4a6080" text-anchor="end" font-family="monospace">'+lat.toFixed(1)+'°N '+Math.abs(lng).toFixed(1)+(lng<0?'°W':'°E')+'</text>'+
  '</svg>';

  mapEl.innerHTML=svg;
}

function dismissReminderFor(months){
  var c=claim;
  var due=new Date('2025-05-29');
  due.setMonth(due.getMonth()+months);
  var dueStr=due.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  if(c) c.audit.unshift({t:'Just now',u:'SW',a:'Reminder snoozed for '+months+' month'+(months!==1?'s':'')+' — next trigger: '+dueStr});
  notify('Reminder snoozed — will trigger again '+dueStr);
  pendingAction=null;
  go('claim');scrollAndFlash();
}

function dismissReminderForPeriod(val,unit){
  var months=unit==='months'?parseInt(val):unit==='weeks'?Math.round(parseInt(val)*7/30):Math.round(parseInt(val)/30);
  months=Math.max(1,months);
  dismissReminderFor(months);
}

function getAuthLimit(c){
  var lim=authLimits.find(function(l){return l.cls===c.cls||c.cls.indexOf(l.cls)>=0;});
  return lim||{limit:100000,cur:c.cur,cls:c.cls};
}

function checkAuthority(c, amount){
  var lim=getAuthLimit(c);
  if(amount>lim.limit){
    return {ok:false,msg:'Amount '+c.cur+' '+amount.toLocaleString()+' exceeds your authority limit of '+lim.cur+' '+(lim.limit/1000).toFixed(0)+'K for '+lim.cls+'. This movement requires escalation.'};
  }
  return {ok:true,msg:'Amount is within your authority limit ('+lim.cur+' '+(lim.limit/1000).toFixed(0)+'K for '+lim.cls+')'};
}

function selectECFStatus(status){
  var btns=['agree','query','decline'];
  btns.forEach(function(s){
    var el=document.getElementById('ecf-btn-'+s);

  });
  var qd=document.getElementById('ecf-query-detail');
  if(qd) qd.style.display=status==='query'?'block':'none';

function submitReserve(claimId,cur,authLimit){
  var ids=['res-indem-1','res-sub-1','res-la-1','res-legal-1','res-survey-1','res-other-1'];
  var total=ids.reduce(function(s,id){var el=document.getElementById(id);return s+(el?parseFloat(el.value)||0:0);},0);

nce:textfield;transition:box-shadow .4s" oninput="_pmLineChange('+ln.id+')" onfocus="this.style.boxShadow=\'\'" onblur="_pmOaBlur('+ln.id+')"></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Orig ccy</div>'+'<select class="fi" id="mvl-oc-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+curOpts+'</select></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Settl amount</div>'+'<input class="fi" id="mvl-sa-'+ln.id+'" inputmode="decimal" placeholder="= orig" value="'+ln.settlAmt+'" style="padding:4px 7px;font-size:12px;font-family:monospace;-moz-appearance:textfield"></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Settl ccy</div>'+'<select class="fi" id="mvl-sc-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+curOpts+'</select></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Payment</div>'+'<input class="fi" id="mvl-pd-'+ln.id+'" inputmode="decimal" placeholder="0.00" value="'+ln.paid+'" style="padding:4px 7px;font-size:12px;font-family:monospace;-moz-appearance:textfield" oninput="_pmLineChange('+ln.id+')" onblur="_pmPaymentBlur('+ln.id+')"></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Payee</div>'+'<select class="fi" id="mvl-py-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+payeeOpts+'</select></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Bank / ref</div>'+'<input class="fi" id="mvl-br-'+ln.id+'" placeholder="e.g. BACS ref" value="'+ln.bankRef+'" style="padding:4px 7px;font-size:11px"></div>'+'<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Outstanding</div>'+'<div id="mvl- function parseShorthand(val){
  // Parse "3k" → 3000, "1.5m" → 1500000, "750K" → 750000 etc.
  if(!val) return '';
  var s=String(val).trim().replace(/,/g,'');
  var m=s.match(/^([0-9.]+)\s*([kmKM]?)$/);
  if(!m) return s;
  var num=parseFloat(m[1]);
  if(isNaN(num)) return s;
  if(m[2]==='k'||m[2]==='K') num*=1000;
  if(m[2]==='m'||m[2]==='M') num*=1000000;
  return String(Math.round(num));
}

function _pmPaymentBlur(id){
  var ln=_mvtLines.find(function(l){return l.id===id;});
  if(!ln)return;
  var pdEl=document.getElementById('mvl-pd-'+id);
  var oaEl=document.getElementById('mvl-oa-'+id);
  if(pdEl){var parsedPd=parseShorthand(pdEl.value);pdEl.value=parsedPd?Number(parsedPd).toLocaleString():'';ln.paid=parsedPd;}
  if(oaEl){var parsedOa=parseShorthand(oaEl.value);if(parsedOa){oaEl.value=Number(parsedOa).toLocaleString();ln.origAmt=parsedOa;}}
  var oa=parseFloat((ln.origAmt||'').replace(/,/g,''))||0;
  var pd=parseFloat((ln.paid||'').replace(/,/g,''))||0;
  var remaining=oa-pd;
  // Update the outstanding (orig amount) field to show the remaining balance
  if(oaEl&&pd>0){
    ln.origAmt=String(remaining);
    oaEl.value=remaining.toLocaleString();
    // Glow the orig amount box to signal it was auto-updated
    oaEl.style.boxShadow='0 0 0 3px rgba(16,185,129,0.5)';
    setTimeout(function(){
      oaEl.style.transition='box-shadow 1.6s ease-out';
      oaEl.style.boxShadow='none';
    },80);
    // Also clear the payment field — it has been applied
    ln.paid='';
    if(pdEl) pdEl.value='';
  }
  _pmRefreshTotals();
}

function _pmOaBlur(id){
  var ln=_mvtLines.find(function(l){return l.id===id;});
  var oaEl=document.getElementById('mvl-oa-'+id);
  if(ln&&oaEl){
    var parsed=parseShorthand(oaEl.value);
    if(parsed){
      ln.origAmt=parsed;
      oaEl.value=Number(parsed).toLocaleString();
    }
  }
  _pmRefreshTotals();
}

function _checkDupeLine(id){
  // Check for duplicate group+cat combos across all lines; show/hide warning
  var ln=_mvtLines.find(function(l){return l.id===id;});
  if(!ln)return;
  var catEl=document.getElementById('mvl-cat-'+id);
  if(catEl) ln.cat=catEl.value;
  _mvtLines.forEach(function(l){
    var isDup=_mvtLines.some(function(other){
      return other.id!==l.id && other.group===l.group && other.cat===l.cat;
    });
    var dupEl=document.getElementById('mvl-dup-'+l.id);
    if(dupEl) dupEl.style.display=isDup?'block':'none';
  });
}

function _checkAllDupes(){
  _mvtLines.forEach(function(l){_checkDupeLine(l.id);});
}

function submitPostMovement(claimId,authLimit){
  _pmSyncLines();
  var narrative=(document.getElementById('pm-narrative')||{}).value||_mvtDesc;
  if(!narrative||!narrative.trim()){notify('Movement narrative is mandatory');return;}
  var hasAmt=_mvtLines.some(function(ln){return parseFloat(ln.origAmt)>0;});
  if(!hasAmt){notify('Please enter an amount on at least one line');return;}
  var totOrig=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.origAmt)||0);},0);
  var totPaid=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.paid)||0);},0);
  var totOut=_mvtLines.reduce(function(s,ln){var oa=parseFloat(ln.origAmt)||0,pd=parseFloat(ln.paid)||0;return s+(ln.manualOut?(parseFloat(ln.out)||0):(oa-pd));},0);
  if(totOrig>authLimit){
    _pmRequestAuth(claimId,authLimit);return;
  }
  var c=CL.find(function(x){return x.id===claimId;});
  if(c){
    var newId='M'+(c.mvts.length+1);
    var breakdown=_mvtLines.filter(function(ln){return parseFloat(ln.origAmt)>0;}).map(function(ln){
      var oa=parseFloat(ln.origAmt)||0,pd=parseFloat(ln.paid)||0;
      return {cat:ln.cat,group:ln.group,amt:oa,origCur:ln.origCur,settlCur:ln.settlCur,
        settlAmt:parseFloat(ln.settlAmt)||oa,payee:ln.payee,bankRef:ln.bankRef,
        paid:pd,out:ln.manualOut?(parseFloat(ln.out)||0):(oa-pd)};
    });
    c.mvts.unshift({id:newId,dt:new Date().toLocaleDateString('en-GB'),
      type:totPaid>0?'payment':'reserve',cat:_mvtLines[0].cat,
      desc:narrative.trim(),paid:totPaid||null,ptd:totPaid,out:totOut,
      ecf:'',processor:'S. Williams',breakdown:breakdown});
    var firstPayee=_mvtLines.find(function(ln){return ln.payee;})||{payee:'—'};
    c.audit.unshift({t:'Just now',u:'SW',a:'Movement posted: '+c.cur+' '+totOrig.toLocaleString()+' original, '+c.cur+' '+totPaid.toLocaleString()+' paid, '+c.cur+' '+totOut.toLocaleString()+' outstanding',
      detail:{type:'post_movement',amount:totOrig,currency:c.cur,payee:firstPayee.payee,category:_mvtLines[0].cat,narrative:narrative.trim(),financeEmailSent:totPaid>0,postedAt:'Just now'}});
    c.notes.unshift({src:'manual',au:'S. Williams',tm:'Just now',body:'Movement posted: '+c.cur+' '+totOrig.toLocaleString()+' ('+_mvtLines[0].cat+'). Finance notified by email.'});
  }
  window._pmWidgetReady=false;_mvtLines=[];
  completedActions[claimId+'_post_movement']=true;
  pendingAction=null;window.actionWidgetOpen=false;
  var pmc=CL.find(function(x){return x.id===claimId;});
  if(pmc){var as=pmc.tl.find(function(s){return s.st==='active';});if(as){as.tasks=as.tasks||[];as.tasks.push({t:'Movement posted: '+c.cur+' '+totOrig.toLocaleString(),who:'S. Williams'});}}
  go('claim');scrollAndFlash();notify('Movement posted · Finance email sent');
}

function sendReminderEmail(){
  var to=document.getElementById('action-to');
  var cc=document.getElementById('action-cc');
  var subj=document.getElementById('action-subj');
  var body=document.getElementById('action-body');
  if(to&&subj){
    notify('Email sent to '+to.value);
    if(claim) claim.audit.unshift({
      t:'Just now',u:'SW',
      a:'Reminder email sent — '+subj.value,
      detail:{
        type:'email',
        to:to.value,
        cc:(cc?cc.value:''),
        subject:subj.value,
        body:(body?body.value:''),
        sentAt:'Just now'
      }
    });
    markReminderComplete();
  }
}

function copyReminderEmail(){
  var body=document.getElementById('action-body');
  if(body){
    try{navigator.clipboard.writeText(body.value);}catch(e){}
    notify('Email copied to clipboard');
  }
}

function markReminderComplete(){
  if(claim) completedActions[claim.id+'_reminder']=true;
  if(claim) claim.audit.unshift({t:'Just now',u:'SW',a:'Reminder completed: '+(pendingAction?pendingAction.note:''),detail:{type:'reminder_complete',note:(pendingAction?pendingAction.note:'')}});
  pendingAction=null;
  window.actionWidgetOpen=false;
  go('claim');scrollAndFlash();
  notify('Reminder marked complete');
}

function swtab(t){
  rtab=t;
  document.querySelectorAll('.rtab').forEach(function(el){el.classList.toggle('on',el.getAttribute('onclick').indexOf("'"+t+"'")>=0);});
  document.getElementById('rtab-c').innerHTML=renderTab();
  if(t==='overview') setTimeout(function(){buildFC('all');fetchOvAI();},80);
  if(t==='movements') setTimeout(function(){buildMC('all');},80);
}

function renderTab(){
  var c=claim;if(!c)return '';
  if(rtab==='overview') return tabOverview(c);
  if(rtab==='movements') return tabMovements(c);
  if(rtab==='documents') return tabDocuments(c);
  if(rtab==='notes') return tabNotes(c);
  if(rtab==='timeline') return tabTimeline(c);
  if(rtab==='record'){var h=tabRecord(c);setTimeout(initRecordFieldClicks,60);return h;}
  if(rtab==='audit') return tabAudit(c);
  return '';
}

function tabMovements(c){
  var ind=c.mvts.filter(function(m){return m.type==='payment'&&m.cat==='Indemnity';}).reduce(function(s,m){return s+(m.paid||0);},0);
  var fees=c.mvts.filter(function(m){return m.type==='payment'&&m.cat!=='Indemnity';}).reduce(function(s,m){return s+(m.paid||0);},0);
  var la=c.mvts.filter(function(m){return m.cat==='LA fees';}).reduce(function(s,m){return s+(m.paid||0);},0);
  var out=c.res-ind;
  var revMvts=[].concat(c.mvts).reverse();

  // Derive source + type for each movement
  // Source: ECF | SCM | Manual
  // Type:   Advice | Reserve | Settlement
  // Rules: bureau claim → ECF(advice/settlement), SCM(settlement), Manual(reserve only)
  //        manual claim → Manual(reserve/settlement)
  function getMvtMeta(m){
    var isBureau=c.bur;
    var src,mvtType,srcCol,typCol;
    if(m.type==='bureau'){
      src='ECF'; mvtType='Advice';
    } else if(!isBureau){
      // Manual claim — all movements are Manual
      src='Manual';
      mvtType=m.type==='reserve'?'Reserve':'Settlement';
    } else if(m.ecf&&m.ecf.indexOf('ECS')>=0){
      src='ECF'; mvtType='Settlement';
    } else if(m.ecf&&m.ecf.indexOf('ADV')>=0){
      src='ECF'; mvtType='Advice';
    } else if(m.ecf&&m.ecf.indexOf('SCM')>=0){
      src='SCM'; mvtType='Settlement';
    } else if(m.type==='payment'&&isBureau){
      // Could be SCM settlement for bureau claims
      src=m.processor&&m.processor.indexOf('SCM')>=0?'SCM':'ECF';
      mvtType='Settlement';
    } else if(m.type==='reserve'){
      src='Manual'; mvtType='Reserve';
    } else {
      src=isBureau?'ECF':'Manual';
      mvtType=m.type==='payment'?'Settlement':'Advice';
    }
    // Colours
    var srcColors={ECF:{c:'var(--gold)',bg:'rgba(212,168,67,.15)'},SCM:{c:'var(--teal)',bg:'rgba(20,184,166,.15)'},Manual:{c:'var(--blue)',bg:'rgba(59,130,246,.15)'}};
    var typColors={Advice:{c:'var(--purple)',bg:'rgba(167,139,250,.15)'},Reserve:{c:'var(--amber)',bg:'rgba(245,158,11,.15)'},Settlement:{c:'var(--green)',bg:'rgba(16,185,129,.15)'}};
    return {src:src,mvtType:mvtType,srcC:srcColors[src]||srcColors.Manual,typC:typColors[mvtType]||typColors.Advice};
  }

  function badge(label,c2,bg){
    return '<span style="font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;background:'+bg+';color:'+c2+';white-space:nowrap">'+label+'</span>';
  }

  var rows=revMvts.map(function(m,i){
    var meta=getMvtMeta(m);
    var expanded=expandedMvt===m.id;

    // Breakdown
    var breakdownHtml='';
    if(m.breakdown&&m.breakdown.length){
      breakdownHtml+='<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px">Breakdown</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
      m.breakdown.map(function(b){
        var bOrigCur=b.origCur||c.cur;
        var bSettlCur=b.settlCur||c.cur;
        var sameCcy=bOrigCur===bSettlCur;
        return '<div class="mvt-detail-card" style="padding:9px 11px">'+
          '<div class="mvt-dc-l">'+b.cat+(b.group?'<span style="font-size:9px;padding:1px 5px;border-radius:3px;margin-left:5px;background:'+(b.group==='fees'?'rgba(59,130,246,0.12)':'rgba(16,185,129,0.12)')+';color:'+(b.group==='fees'?'var(--blue)':'var(--green)')+'">'+b.group+'</span>':'')+'</div>'+
          '<div style="font-size:13px;font-family:monospace;font-weight:600;color:var(--t1);margin:3px 0">'+bOrigCur+' '+b.amt.toLocaleString()+(!sameCcy?' → '+bSettlCur+' '+(b.settlAmt||b.amt).toLocaleString():'')+'</div>'+
          (b.paid?'<div style="font-size:11px;color:var(--green)">Paid: '+bOrigCur+' '+b.paid.toLocaleString()+'</div>':'')+
          (b.out!==undefined?'<div style="font-size:11px;color:var(--amber)">Outstanding: '+bOrigCur+' '+b.out.toLocaleString()+'</div>':'')+
          (b.payee?'<div style="font-size:11px;color:var(--t3);margin-top:3px">Payee: '+b.payee+'</div>':'')+
          (b.bankRef?'<div style="font-size:11px;color:var(--t3)">Ref: '+b.bankRef+'</div>':'')+
        '</div>';}).join('')+
      '</div></div>';
    }

    // Meta info row
    breakdownHtml+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:10px">'+
      '<div><div class="if-l">Processed by</div><div class="if-v">'+m.processor+'</div></div>'+
      '<div><div class="if-l">Source</div><div class="if-v" style="display:flex;align-items:center;gap:6px">'+badge(meta.src,meta.srcC.c,meta.srcC.bg)+'</div></div>'+
      '<div><div class="if-l">Type</div><div class="if-v" style="display:flex;align-items:center;gap:6px">'+badge(meta.mvtType,meta.typC.c,meta.typC.bg)+'</div></div>'+
      (m.ecf?'<div><div class="if-l">Reference</div><div class="if-v if-mono">'+m.ecf+'</div></div>':'<div></div>')+
    '</div>';

    // ECF message viewer
    if(m.ecf&&meta.src==='ECF'){
      var ecfGrp=c.ecfm?c.ecfm.find(function(g){return g.mvtId===m.id;}):null;
      if(ecfGrp){
        breakdownHtml+='<button class="btn sm" style="margin-right:7px" onclick="expandedEcfMvt=\''+ecfGrp.mvtId+'\';swtab(\'overview\')">View ECF messages &rarr;</button>';
      }
    }

    // SCM viewer
    if(meta.src==='SCM'){
      breakdownHtml+=renderSCMViewer(m,c);
    }

    // Cat/event coding
    var claimCodes=MOVEMENT_CODES[c.id]||{};
    var mvtCodes=claimCodes[m.id]||null;
    var catBadge='';
    if(mvtCodes){
      if(mvtCodes.catCode){
        catBadge='<div style="margin-top:8px;display:flex;align-items:center;gap:7px">'+
          '<span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--red-d);color:var(--red);font-weight:600">CAT: '+mvtCodes.catCode+'</span>'+
          (mvtCodes.eventCode?'<span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--blue-d);color:var(--blue);font-weight:600">EVENT: '+mvtCodes.eventCode+'</span>':'<span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--amber-d);color:var(--amber)">Event code pending</span>')+
          (mvtCodes.note?'<span style="font-size:11px;color:var(--t3)">'+mvtCodes.note+'</span>':'')+
        '</div>';
      } else if(mvtCodes.awaiting){
        catBadge='<div style="margin-top:8px"><span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--amber-d);color:var(--amber)">&#x23F1; Awaiting cat code assignment</span></div>';
      }
    }

    var mc=m.type==='payment'?'mv-pay':m.type==='reserve'?'mv-res':'mv-bur';

    return '<div class="mvt-row-wrap">'+
      '<div class="mvt-row '+(expanded?'expanded':'')+'\" onclick="toggleMvt(\''+m.id+'\')">'+
        '<div class="mn" style="color:var(--t2);white-space:nowrap;font-size:11px">'+m.dt+'</div>'+
        '<div>'+badge(meta.mvtType,meta.typC.c,meta.typC.bg)+'</div>'+
        '<div style="font-size:11px;color:var(--t2)">'+m.cat+'</div>'+
        '<div style="font-size:11.5px;color:var(--t1)">'+m.desc+'</div>'+
        '<div class="mn '+(m.paid?'mp':'m0')+'" style="text-align:right">'+(m.paid?c.cur+' '+m.paid.toLocaleString():'—')+'</div>'+
        '<div class="mn" style="text-align:right;color:var(--t1)">'+(m.ptd?c.cur+' '+m.ptd.toLocaleString():'—')+'</div>'+
        '<div class="mn '+(m.out&&m.out>0?'mng':'m0')+'" style="text-align:right">'+(m.out!==null&&m.out!==undefined?c.cur+' '+m.out.toLocaleString():'—')+'</div>'+
        '<div style="font-size:11px;color:var(--t3)">'+meta.src+'</div>'+
        '<div style="font-size:11px;color:var(--t3);text-align:right">'+(expanded?'&#x25B2;':'&#x25BC;')+'</div>'+
      '</div>'+
      '<div class="mvt-expand '+(expanded?'open':'')+'\" id="mvt-exp-'+m.id+'">'+breakdownHtml+catBadge+'<div style="margin-top:10px;display:flex;gap:7px"><button class="btn sm p" onclick="notify(\'Assign cat/event code\')">+ Assign cat/event code</button></div></div>'+
    '</div>';
  }).join('');

  return '<div class="g3">'+
    '<div class="ms-card"><div class="ms-l">Total outstanding</div><div class="ms-v" style="color:var(--amber)">'+c.cur+' '+out.toLocaleString()+'</div><div class="ms-s">Reserve less paid</div>'+
    '<div class="ms-bd"><div class="ms-r"><span>Indemnity o/s</span><span>'+c.cur+' '+(out-Math.max(0,70000-fees)).toLocaleString()+'</span></div><div class="ms-r"><span>Fees o/s</span><span>'+c.cur+' '+Math.max(0,70000-fees).toLocaleString()+'</span></div></div></div>'+
    '<div class="ms-card"><div class="ms-l">Paid — indemnity</div><div class="ms-v" style="color:var(--green)">'+c.cur+' '+ind.toLocaleString()+'</div><div class="ms-s">Indemnity only</div>'+
    '<div class="ms-bd"><div class="ms-r"><span>Interim</span><span>'+c.cur+' '+ind.toLocaleString()+'</span></div><div class="ms-r"><span>Final</span><span>—</span></div></div></div>'+
    '<div class="ms-card"><div class="ms-l">Paid — fees</div><div class="ms-v" style="color:var(--teal)">'+c.cur+' '+fees.toLocaleString()+'</div><div class="ms-s">All fee categories</div>'+
    '<div class="ms-bd"><div class="ms-r"><span>Loss adjuster</span><span>'+c.cur+' '+(la||0).toLocaleString()+'</span></div><div class="ms-r"><span>Other fees</span><span>'+c.cur+' '+(fees-la).toLocaleString()+'</span></div></div></div>'+
  '</div>'+
  '<div class="card" style="margin-bottom:14px"><div class="ch"><div class="ch-t">Financial history</div>'+
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
      '<div class="ctog" id="mc-tog">'+
        '<button class="ctb on" onclick="setMC(\'all\',this)">All</button>'+
        '<button class="ctb" onclick="setMC(\'indemnity\',this)">Indemnity</button>'+
        '<button class="ctb" onclick="setMC(\'fees\',this)">Fees</button>'+
      '</div>'+
    '</div>'+
  '</div>'+
  '<div class="cb">'+
    '<div style="position:relative;height:180px"><canvas id="mc-chart" role="img" aria-label="Movement financial history"></canvas></div>'+
  '</div></div>'+
  '<div class="card"><div class="ch"><div class="ch-t">Movement history <span style="font-size:10px;color:var(--t3);font-weight:400">— click row to expand</span></div><button class="btn sm p" onclick="showNewMvtModal()">+ New</button></div>'+
  '<div style="overflow-x:auto">'+
  '<div style="display:grid;grid-template-columns:90px 80px 80px 1fr 90px 90px 90px 70px 40px;padding:7px 9px;background:var(--bg2)">'+
  '<div class="cth">Date</div><div class="cth">Type</div><div class="cth">Category</div><div class="cth">Description</div>'+
  '<div class="cth" style="text-align:right">Paid</div><div class="cth" style="text-align:right">Paid to date</div><div class="cth" style="text-align:right">Outstanding</div>'+
  '<div class="cth">Source</div><div class="cth"></div>'+
  '</div>'+
  rows+
  '</div></div>';
}

function renderSCMViewer(m,c){
  // Build a realistic SCM settlement message display
  var scmRef='SCM-'+c.ref.replace(/[^A-Z0-9]/g,'')+'-'+m.id;
  var msgDate=m.dt;
  var lines=[
    {k:'SCM Reference',v:scmRef},
    {k:'Settlement Type',v:'Final Settlement — Cash Call'},
    {k:'Paying Party',v:'Velonetic / Xchanging Settlement Services'},
    {k:'Receiving Party',v:c.ins+' (via '+c.broker+')'},
    {k:'Currency',v:c.cur},
    {k:'Amount',v:c.cur+' '+(m.paid||0).toLocaleString()},
    {k:'Value Date',v:msgDate},
    {k:'Settlement Method',v:'CHAPS / SWIFT MT103'},
    {k:'Bank Reference',v:'SCM-'+Math.random().toString(36).slice(2,10).toUpperCase()},
    {k:'IBAN',v:'GB**MIDL**40153791588888'},
    {k:'Narrative',v:m.desc},
    {k:'Bureau Reference',v:c.ref},
    {k:'UCR',v:c.ref+'-00'+m.id.slice(1)},
    {k:'Status',v:'Settled and confirmed'},
  ];
  return '<div style="margin-top:10px;background:var(--bg4);border:1px solid rgba(20,184,166,.25);border-left:3px solid var(--teal);border-radius:var(--r);padding:0;overflow:hidden">'+
    '<div style="display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(20,184,166,.06);border-bottom:1px solid rgba(20,184,166,.2)">'+
      '<span style="font-size:13px">&#x21C4;</span>'+
      '<div style="font-size:12px;font-weight:600;color:var(--teal)">SCM Settlement message</div>'+
      '<div style="font-size:11px;color:var(--t3);margin-left:4px">'+scmRef+'</div>'+
      '<div style="margin-left:auto;font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(20,184,166,.15);color:var(--teal);font-weight:600">Settled</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">'+
    lines.map(function(l,i){
      return '<div style="display:flex;gap:8px;padding:7px 13px;border-bottom:1px solid rgba(42,63,96,.2);'+(i%2===1?'background:rgba(42,63,96,.04)':'')+'">'+
        '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;min-width:110px;flex-shrink:0">'+l.k+'</div>'+
        '<div style="font-size:11px;color:var(--t1);font-family:'+(l.k.indexOf('Reference')>=0||l.k==='IBAN'||l.k==='Bank Reference'?'monospace':'inherit')+'">'+l.v+'</div>'+
      '</div>';
    }).join('')+
    '</div>'+
  '</div>';
}

      '<div class="nb">'+n.body+'</div>'+
      (n.task?'<div class="ntask">&#x23F1; '+n.task+'</div>':'')+

function tabTimeline(c){
  var activeIdx=c.tl.findIndex(function(s){return s.st==='active';});
  var stepsHtml='<div class="tl-hz" style="margin-bottom:16px"><div class="tl-hz-inner">';
  c.tl.forEach(function(step,i){
    var cls=step.st==='done'?'done':step.st==='active'?'active':'';
    var icon=step.st==='done'?'&#x2713;':step.st==='active'?'&#x25CF;':(i+1).toString();
    stepsHtml+='<div class="tl-step '+cls+'" id="tl2step-'+i+'">'+
      '<div class="tl-dot-hz" onclick="scrollToTlPhase('+i+')" title="Jump to phase">'+icon+'</div>'+
      '<div class="tl-step-label">'+step.ev+'<br><span style="font-size:9px;color:var(--t3)">'+step.who+'</span></div>'+
      '<div class="tl-step-date">'+step.dt+'</div>'+
    '</div>';
  });
  stepsHtml+='</div></div>';

  // Build all tasks in reverse-chronological order (tasks within each step treated as latest first)
  var allItems=[];
  c.tl.forEach(function(step,si){
    if(!step.tasks||!step.tasks.length)return;
    step.tasks.slice().reverse().forEach(function(tk,ti){
      allItems.push({step:step,stepIdx:si,task:tk,key:si+'-'+ti});
    });
  });
  // Sort by step index descending (most recent phase first, tasks within phase newest first)
  allItems.sort(function(a,b){return b.stepIdx-a.stepIdx;});

  var listHtml='<div id="tl-activity-list" style="max-height:520px;overflow-y:auto;">';
  var lastPhase='';
  allItems.forEach(function(item){
    var phaseKey=item.stepIdx;
    if(phaseKey!==lastPhase){
      var pStep=item.step;
      var pcls=pStep.st==='done'?'var(--green)':pStep.st==='active'?'var(--blue)':'var(--t3)';
      listHtml+='<div id="tl-phase-'+item.stepIdx+'" style="display:flex;align-items:center;gap:8px;padding:8px 0 5px;margin-top:6px">'+
        '<div style="width:20px;height:20px;border-radius:50%;background:'+pcls+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">'+(pStep.st==='done'?'&#x2713;':pStep.st==='active'?'&#x25CF;':String(item.stepIdx+1))+'</div>'+
        '<div style="font-size:12px;font-weight:600;color:var(--t1)">'+pStep.ev+'</div>'+
        '<div style="font-size:10px;color:var(--t3);font-family:monospace">'+pStep.dt+'</div>'+
        '<div style="font-size:10px;color:var(--t3)">'+pStep.who+'</div>'+
        (pStep.st==='active'?'<span style="font-size:10px;padding:2px 6px;border-radius:8px;background:var(--blue-d);color:var(--blue)">Current</span>':'')+
      '</div>';
      lastPhase=phaseKey;
    }
    var whoColor=item.task.who==='System'?'var(--teal)':item.task.who==='Pending'?'var(--amber)':'var(--blue)';
    listHtml+='<div style="display:flex;align-items:flex-start;gap:9px;padding:6px 0 6px 12px;border-bottom:1px solid rgba(42,63,96,.2)">'+
      '<div style="width:14px;height:14px;border-radius:50%;background:'+(item.step.st==='done'?'var(--green-d)':'var(--blue-d)')+';border:1px solid '+(item.step.st==='done'?'var(--green)':'var(--blue)')+';display:flex;align-items:center;justify-content:center;font-size:8px;color:'+(item.step.st==='done'?'var(--green)':'var(--blue)')+';flex-shrink:0;margin-top:2px">&#x2713;</div>'+
      '<div style="flex:1"><div style="font-size:12px;color:var(--t1)">'+item.task.t+'</div></div>'+
      '<div style="font-size:11px;color:'+whoColor+';flex-shrink:0">'+item.task.who+'</div>'+
    '</div>';
  });
  listHtml+='</div>';

  return stepsHtml+
    '<div style="font-size:11px;color:var(--t3);margin-bottom:10px">All activity in reverse chronological order — click a step above to jump to that phase.</div>'+
    listHtml;
}

function tabRecord(c){

  function srcTag(src, dt){
    var label,col,bg;
    if(!src||src==='—'){return '';}
    if(src.indexOf('ecf:')=== 0){
      var parts=src.split(':');
      label='ECF '+parts[1]+(parts[2]?' msg '+(parseInt(parts[2])+1):'');
      col='var(--gold)';bg='rgba(212,168,67,.15)';
    } else if(src.indexOf('idp:')=== 0){
      label='IDP';col='var(--purple)';bg='rgba(167,139,250,.15)';
    } else if(src.indexOf('manual:')=== 0){
      label='Manual';col='var(--blue)';bg='rgba(59,130,246,.15)';
    } else if(src==='scm'){
      label='SCM';col='var(--teal)';bg='rgba(20,184,166,.15)';
    } else {
      label=src;col='var(--t3)';bg='rgba(74,96,128,.15)';
    }
    return '<span class="record-src-tag" data-src="'+src+'" data-dt="'+(dt||'')+'\" '+
      'style="font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;cursor:pointer;'+
      'background:'+bg+';color:'+col+';flex-shrink:0;border:1px solid '+col.replace(')',',0.3)').replace('var(','rgba(')+'\"'+
      '>'+label+'</span>';
  }

  function fld(label, val, src, dt, readOnly){
    var fieldId='rf-'+label.replace(/[^a-z0-9]/gi,'');
    var valHtml=(!readOnly&&recordEditMode)?
      '<input class="fi" id="'+fieldId+'" value="'+String(val).replace(/"/g,'&quot;')+'" style="font-size:12px;padding:4px 7px;flex:1">':
      '<span style="flex:1;font-size:12px;color:var(--t1)">'+val+'</span>';
    return '<div class="record-field" style="display:flex;align-items:baseline;justify-content:space-between;padding:8px 10px;border-bottom:1px solid rgba(42,63,96,.2);gap:8px">'+

  var ecfSrcLatest=latestEcfGrp?('ecf:'+latestEcfGrp.mvtId+':0'):'system';

    (recordEditMode?

        '<button class="btn sm" style="color:var(--green);border-color:rgba(16,185,129,.3)" onclick="saveRecordEdits()">&#x2713; Save changes</button>'+
        '<button class="btn sm" onclick="toggleRecordEdit()">Cancel</button>'+
      '</div>':
      '<button class="btn sm p" onclick="toggleRecordEdit()">&#x270E; Edit claim record</button>')+
  '</div>'+
  '<div id="field-source-popup"></div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+

  // ── Left column ────────────────────────────────────────────────────────
  '<div>'+
    '<div class="card"><div class="ch"><div class="ch-t">Claim identifiers</div></div>'+
    fld('Claim reference',c.id,'manual:S. Williams',c.fnol+' 09:14',true)+
    fld('Bureau / UCR reference',c.ref,ecfSrc0,firstEcfDate,true)+
    fld('Unique claim reference',ucr,ecfSrc0,firstEcfDate,true)+
    fld('Policy / slip reference',c.ref,'idp:'+( c.docs&&c.docs.length?c.docs[0].n:'Slip'),c.fnol+' 09:16',true)+
    '</div>'+

    '<div class="card" style="margin-top:12px"><div class="ch"><div class="ch-t">Parties</div></div>'+
    fld('Insured',c.ins,'idp:'+(c.docs&&c.docs.length?c.docs[0].n:'FNOL'),c.fnol+' 09:14')+
    fld('Broker',c.broker,'manual:S. Williams',c.fnol+' 09:14')+
    fld('Lead underwriter','XYZ Syndicate 1234',ecfSrc0,firstEcfDate,true)+
    fld('Lead line %','25%',ecfSrc0,firstEcfDate,true)+
    fld('Handling adjuster',c.hdl,'manual:S. Williams','03 Feb 2025 10:00')+
    fld('LOA',c.loa,'manual:S. Williams',c.fnol+' 09:14')+
    '</div>'+

    '<div class="card" style="margin-top:12px"><div class="ch"><div class="ch-t">Risk details</div></div>'+
    fld('Class of business',c.cls,ecfSrc0,firstEcfDate,true)+
    fld('Currency',c.cur,ecfSrc0,firstEcfDate,true)+
    fld('Sum insured',c.cur+' 2,500,000','idp:'+(c.docs&&c.docs.length?c.docs[0].n:'Slip'),c.fnol+' 09:16')+
    fld('Excess / deductible',c.cur+' 25,000','idp:'+(c.docs&&c.docs.length?c.docs[0].n:'Slip'),c.fnol+' 09:16')+
    fld('Bureau claim',c.bur?'Yes — ECLAIR':'Manual only',ecfSrc0,firstEcfDate,true)+
    '</div>'+

  // ── Right column ───────────────────────────────────────────────────────
  '<div>'+
    '<div class="card"><div class="ch"><div class="ch-t">Loss details</div></div>'+
    fld('Date of FNOL',c.fnol,'manual:S. Williams',c.fnol+' 09:14')+
