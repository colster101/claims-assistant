    fld('Date of loss to',c.fnol,'idp:'+(c.docs&&c.docs.length?c.docs[0].n:'FNOL'),c.fnol+' 09:14')+
    fld('Cause of loss',c.id==='CLM-2025-0441'?'Water ingress — holds 3 and 4':c.cls+' loss event','idp:'+(c.docs&&c.docs.length&&c.docs[1]?c.docs[1].n:'Adjuster report'),'10 Feb 2025 11:20')+
    fld('Location of loss',c.id==='CLM-2025-0441'?'Atlantic Ocean — in transit':'On risk','idp:'+(c.docs&&c.docs.length&&c.docs[1]?c.docs[1].n:'Adjuster report'),'10 Feb 2025 11:20')+
    fld('Loss description',c.id==='CLM-2025-0441'?'Cargo vessel sustained significant water damage during transit':'Loss event per FNOL','manual:S. Williams',c.fnol+' 09:14')+
    '</div>'+

    '<div class="card" style="margin-top:12px"><div class="ch"><div class="ch-t">Financials</div></div>'+
    fld('Reserve (indemnity)',c.cur+' '+(c.res*0.9).toLocaleString(),'manual:S. Williams','03 Feb 2025 14:22')+
    fld('Reserve (fees)',c.cur+' '+(c.res*0.1).toLocaleString(),'manual:S. Williams','03 Feb 2025 14:22')+
    fld('Paid to date',c.cur+' '+(c.mvts.reduce(function(s,m){return s+(m.paid||0);},0)).toLocaleString(),
      c.mvts.some(function(m){return m.paid;})?('ecf:'+(c.mvts.find(function(m){return m.paid;})||{id:'M1'}).id+':0'):'—',latestEcfDate)+
    fld('Premium paid','Yes — '+c.fnol,ecfSrc0,firstEcfDate,true)+
    '</div>'+

    '<div class="card" style="margin-top:12px"><div class="ch"><div class="ch-t">Status and flags</div></div>'+
    fld('Claim status',c.st.charAt(0).toUpperCase()+c.st.slice(1),'manual:S. Williams',c.fnol+' 09:14')+

  '</div>';
}


function initRecordFieldClicks(){
  setTimeout(function(){
    document.querySelectorAll('.record-src-tag').forEach(function(el){
      el.addEventListener('click',function(e){
        e.stopPropagation();
        showFieldSource(this.dataset.src,this.dataset.dt);

function showFieldSource(src,dt){
  var popup=document.getElementById('field-source-popup');
  if(!popup)return;
  var html,navFn=null;

  if(src.indexOf('ecf:')=== 0){
    var parts=src.split(':');
    var mvtId=parts[1],msgIdx=parseInt(parts[2]||0);
    var grp=claim&&claim.ecfm?claim.ecfm.find(function(g){return g.mvtId===mvtId;}):null;
    var msg=grp&&grp.messages?grp.messages[msgIdx]:null;
    html='<span style="color:var(--gold);font-weight:600">ECF message</span> · '+
      '<span style="font-family:monospace;font-size:11px">'+mvtId+(msg?' · '+msg.type:'')+'</span>'+
      '<span style="color:var(--t3)"> · Populated: '+dt+'</span>'+
      (msg?'<div style="font-size:11px;color:var(--t2);margin-top:4px">'+msg.detail.slice(0,100)+'…</div>':'');
    navFn=function(){
      if(!claim||!claim.ecfm)return;
      var grpIdx=claim.ecfm.findIndex(function(g){return g.mvtId===mvtId;});
      if(grpIdx>=0){expandedEcfMvt=mvtId;swtab('overview');
        setTimeout(function(){var el=document.getElementById('ecf-msgs-'+mvtId);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});}},200);
      }
    };
  } else if(src.indexOf('idp:')=== 0){
    var docName=src.slice(4);
    html='<span style="color:var(--purple);font-weight:600">IDP / document</span> · '+
      '<span style="font-family:monospace;font-size:11px">'+docName+'</span>'+
      '<span style="color:var(--t3)"> · Populated: '+dt+'</span>';
    navFn=function(){swtab('documents');setTimeout(function(){if(claim&&claim.docs&&claim.docs.length)selectDoc(claim.docs[0].n);},150);};
  } else if(src.indexOf('manual:')=== 0){
    var user=src.slice(7);
    html='<span style="color:var(--blue);font-weight:600">Manual entry</span> · '+
      '<span style="color:var(--t2)">'+user+'</span>'+
      '<span style="color:var(--t3)"> · Populated: '+dt+'</span>';
  } else if(src==='scm'){
    html='<span style="color:var(--teal);font-weight:600">SCM / Velonetic</span>'+
      '<span style="color:var(--t3)"> · Populated: '+dt+'</span>'+
      '<div style="font-size:11px;color:var(--t2);margin-top:4px">Settlement confirmed via Velonetic SCM. See movement history for full message.</div>';
    navFn=function(){
      swtab('movements');
      setTimeout(function(){
        // Find and expand the SCM movement
        if(!claim) return;
        var scmMvt=claim.mvts.find(function(m){return m.ecf&&m.ecf.indexOf('SCM')>=0;});
        if(scmMvt){
          expandedMvt=scmMvt.id;
          document.getElementById('rtab-c').innerHTML=renderTab();
          setTimeout(function(){
            var el=document.getElementById('mvt-exp-'+scmMvt.id);
            if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
          },150);
        }
      },150);
    };
  } else {
    html='<span style="color:var(--t3)">'+src+'</span><span style="color:var(--t3)"> · '+dt+'</span>';
  }

  popup.innerHTML='<div style="background:var(--bg4);border:1px solid var(--bdr2);border-radius:var(--r);padding:9px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px">'+
    '<span style="font-size:12px">&#x1F4CC;</span>'+
    '<div style="flex:1">'+html+'</div>'+
    (navFn?'<button id="fsp-nav" class="btn sm" style="font-size:10px">View source &rarr;</button>':'')+
    '<button id="fsp-close" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;line-height:1">&#x2715;</button>'+
  '</div>';
  setTimeout(function(){
    var cb=document.getElementById('fsp-close');
    if(cb) cb.onclick=function(){popup.innerHTML='';};
    var nb=document.getElementById('fsp-nav');
    if(nb&&navFn) nb.onclick=navFn;
  },20);
}


function toggleRecordEdit(){
  recordEditMode=!recordEditMode;
  document.getElementById('rtab-c').innerHTML=renderTab();
  setTimeout(initRecordFieldClicks,60);
}

function saveRecordEdits(){
  var c=claim;if(!c)return;
  var changed=[];
  document.querySelectorAll('.record-field input.fi').forEach(function(inp){
    var newVal=inp.value.trim();
    var label=inp.closest('.record-field').querySelector('div:first-child').textContent;
    if(label==='Insured name'){if(c.ins!==newVal){changed.push('Insured: '+c.ins+' → '+newVal);c.ins=newVal;}}
    else if(label==='Broker'){if(c.broker!==newVal){changed.push('Broker: '+c.broker+' → '+newVal);c.broker=newVal;}}
    else if(label==='Handling adjuster'){if(c.hdl!==newVal){changed.push('Handler: '+c.hdl+' → '+newVal);c.hdl=newVal;}}
    else if(label==='Loss description'){changed.push('Loss description updated');}
    else{changed.push('Field "'+label+'" updated to: '+newVal);}
  });
  if(changed.length){
    changed.forEach(function(ch){
      c.audit.unshift({t:'Just now',u:'SW',a:'Record edit: '+ch});
    });
    notify('Saved '+changed.length+' change'+(changed.length>1?'s':''));
  } else {
    notify('No changes to save');
  }
  recordEditMode=false;
  document.getElementById('rtab-c').innerHTML=renderTab();
  setTimeout(initRecordFieldClicks,60);
}

          (a.detail.privateComment?'<div style="padding:8px 12px;border-bottom:1px solid var(--bdr);background:rgba(124,58,237,0.03)">'+auditField2('Private comment',escapeHtml(a.detail.privateComment))+'</div>':'')+
          (a.detail.internalComment?'<div style="padding:8px 12px;background:rgba(124,58,237,0.06)">'+auditField2('Internal (not transmitted)',escapeHtml(a.detail.internalComment))+'</div>':
          '<div style="padding:8px 12px;background:rgba(124,58,237,0.03)"><span style="font-size:11px;color:var(--t3)">No internal comment recorded.</span></div>')+
          '</div>';
      } else if(a.detail.type==='lirma_circulate'){
        detailHtml=auditSection('Circulated to agreement parties',
          auditField2('Status',a.detail.status)+
          auditField2('Submitted',a.detail.submittedAt))+
          (a.detail.publicComment?'<div style="padding:8px 12px;background:rgba(124,58,237,0.03)">'+auditField2('Public comment',escapeHtml(a.detail.publicComment))+'</div>':'')+
          '</div>';
      } else if(a.detail.type==='lirma_response'){
        detailHtml=auditSection('Agreement response',
          auditField2('Status',a.detail.status)+
          auditField2('Submitted',a.detail.submittedAt))+
          (a.detail.publicComment?'<div style="padding:8px 12px;border-bottom:1px solid var(--bdr);background:rgba(124,58,237,0.03)">'+auditField2('Public comment',escapeHtml(a.detail.publicComment))+'</div>':'')+
          (a.detail.internalComment?'<div style="padding:8px 12px;background:rgba(124,58,237,0.06)">'+auditField2('Internal (not transmitted)',escapeHtml(a.detail.internalComment))+'</div>':'')+
          '</div>';
      } else if(a.detail.type==='reserve_confirm'){
        detailHtml=auditSection('Reserve confirmed',
          auditField2('Total reserve',a.detail.currency+' '+(a.detail.total||0).toLocaleString())+
          auditField2('Within authority',a.detail.withinAuthority?'Yes':'No — escalation required')+
          auditField2('Confirmed',a.detail.confirmedAt))+
          '<div style="padding:8px 12px;background:rgba(124,58,237,0.03)">'+auditField2('Narrative',escapeHtml(a.detail.narrative||''))+'</div></div>';
      } else if(a.detail.type==='post_movement'){
        detailHtml=auditSection('Movement posted',
          auditField2('Amount',a.detail.currency+' '+(a.detail.amount||0).toLocaleString())+
          auditField2('Category',a.detail.category)+
          auditField2('Payee',a.detail.payee)+
          auditField2('Finance notified',a.detail.financeEmailSent?'Yes — payment request sent':'No')+
          auditField2('Posted',a.detail.postedAt))+
          '<div style="padding:8px 12px;background:rgba(124,58,237,0.03)">'+auditField2('Narrative',escapeHtml(a.detail.narrative||''))+'</div></div>';
      } else {
        detailHtml=auditSection('Action detail',auditField2('Type',a.detail.type)+auditField2('Status',(a.detail.status||'')))+'</div>';
      }
    }
    return '<div style="'+(i%2===1?'background:var(--bg4)':'')+'">'+rowHtml+detailHtml+'</div>';
  }).join('')+
  '</div></div>';
}

function auditEmailField(label,val){
  return '<div style="display:flex;gap:8px;font-size:11px">'+
    '<span style="color:var(--t3);min-width:50px">'+label+'</span>'+
    '<span style="color:var(--t1);font-weight:500">'+val+'</span>'+
  '</div>';
}

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleAuditRow(i){
  expandedAuditIdx=expandedAuditIdx===i?null:i;
  document.getElementById('rtab-c').innerHTML=renderTab();
}

function showNoteForm(){
  var f=document.getElementById('note-form');
  if(f.innerHTML){f.innerHTML='';return;}
  f.innerHTML='<div class="card" style="margin-bottom:11px"><div class="cb">'+
    '<div style="margin-bottom:8px"><div class="fl">Note body</div><textarea class="fi" id="ni-b" placeholder="Enter note..."></textarea></div>'+
    '<div class="fg2"><div><div class="fl">Type</div><select class="fi" id="ni-t"><option value="manual">Manual note</option><option value="task">Task</option></select></div>'+
    '<div><div class="fl">Linked to</div><select class="fi"><option>Claim record</option>'+(claim.mvts||[]).map(function(m){return '<option>Mvt '+m.id+'</option>';}).join('')+'</select></div></div>'+
    '<div style="display:flex;gap:7px;justify-content:flex-end;margin-top:8px"><button class="btn" onclick="showNoteForm()">Cancel</button><button class="btn p" onclick="saveNote()">Save note</button></div>'+

function saveNote(){
  var b=document.getElementById('ni-b');var t=document.getElementById('ni-t');
  if(!b||!b.value.trim()){notify('Please enter note text');return;}
  claim.notes.unshift({src:t?t.value:'manual',au:'S. Williams',tm:'Just now',body:b.value.trim()});
  claim.audit.unshift({t:'Just now',u:'SW',a:'Note added: '+b.value.trim().slice(0,50)});
  nfilt='all';
  document.getElementById('rtab-c').innerHTML=renderTab();
  fetchAINarrative();
  notify('Note saved');
}

function askClaimAI(){
  var inp=document.getElementById('ai-q-input');
  var ans=document.getElementById('ai-q-answer');
  if(!inp||!ans||!inp.value.trim())return;
  var q=inp.value.trim();
  ans.style.display='block';
  ans.innerHTML='<span style="color:var(--t3)">Thinking...</span>';
  var c=claim;
  if(!c){ans.innerHTML='No claim loaded.';return;}
  var ctx='Claim '+c.id+' ('+c.ins+'), '+c.cls+', '+c.cur+' '+c.res.toLocaleString()+' reserve, LOA: '+c.loa+', status: '+c.st+(c.ror?', ROR active':'')+'. Recent audit: '+(c.audit.slice(0,3).map(function(a){return a.a;}).join('; '))+'.';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:400,
      system:'You are a concise London market claims assistant. Answer in 2-3 sentences max. Only answer based on the claim context provided.',
      messages:[{role:'user',content:'Claim context: '+ctx+'\n\nQuestion: '+q}]
    })
  }).then(function(r){return r.json();}).then(function(d){
    var txt=d.content&&d.content[0]?d.content[0].text:'No response.';
    ans.innerHTML='<strong style="color:#a78bfa;font-size:10px;text-transform:uppercase;letter-spacing:.5px">AI</strong> <span style="color:var(--t1)">'+txt+'</span>';
    inp.value='';
  }).catch(function(e){
    ans.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';
  });
}

function fetchOvAI(){
  var el=document.getElementById('ov-ai-text');
  if(!el)return;
  var c=claim;if(!c)return;
  var paid=c.mvts.filter(function(m){return m.type==='payment';}).reduce(function(s,m){return s+(m.paid||0);},0);
  var activeStep=c.tl.find(function(s){return s.st==='active';});
  var pendingTasks=activeStep&&activeStep.tasks?activeStep.tasks.filter(function(t){return t.who==='Pending';}).map(function(t){return t.t;}).join(', '):'none';
  var prompt='You are a claims intelligence assistant for a London insurance market workbench. Provide a 2-sentence claim status summary for a senior claims handler. First sentence: current stage and financial position. Second sentence: most urgent action needed and any flags (ROR, sanctions, overdue tasks). Be direct and specific. Claim ID: '+c.id+'. Insured: '+c.ins+'. Class: '+c.cls+'. LOA: '+c.loa+'. Reserve: '+c.cur+' '+c.res.toLocaleString()+'. Paid to date: '+c.cur+' '+paid.toLocaleString()+'. Status: '+c.st+(c.ror?' — RESERVATION OF RIGHTS ACTIVE':'')+'. Bureau: '+(c.bur?'Lloyd\'s ECF2 / ACORD4ALL':'Manual / non-bureau')+'. Current phase: '+(activeStep?activeStep.ev:'unknown')+'. Pending: '+pendingTasks+'. Movements: '+c.mvts.length+' on record. Third parties: '+c.parties.map(function(p){return p.r;}).join(', ')+'. Do not use markdown or bullet points. Write flowing professional prose only.';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();}).then(function(d){
    var txt=d.content&&d.content[0]&&d.content[0].text?d.content[0].text:'';
    var el2=document.getElementById('ov-ai-text');
    if(el2&&txt){el2.textContent=txt;el2.style.fontStyle='normal';el2.style.color='var(--t1)';}
  }).catch(function(){
    var el2=document.getElementById('ov-ai-text');
    var paid2=c.mvts.filter(function(m){return m.type==='payment';}).reduce(function(s,m){return s+(m.paid||0);},0);
    var activeStep2=c.tl.find(function(s){return s.st==='active';});
    var activeStep2x=c.tl.find(function(s){return s.st==='active';});
    var pending2=activeStep2x&&activeStep2x.tasks?activeStep2x.tasks.find(function(t){return t.who==='Pending';}):'';
    var fallback=c.ins+' — '+c.cur+' '+c.res.toLocaleString()+' reserve, '+c.cur+' '+paid2.toLocaleString()+' paid. Stage: '+((activeStep2&&activeStep2.ev)||'unknown')+(c.ror?' ROR active':'')+'. '+(pending2?'Pending: '+pending2.t+'.':'Next: progress to '+((activeStep2x&&activeStep2x.ev)||'next stage')+'.');
    if(el2){el2.textContent=fallback;el2.style.fontStyle='normal';el2.style.color='var(--t1)';}
  });
}

function fetchAINarrative(){
  var el=document.getElementById('ai-thinking-text');
  if(!el)return;
  var c=claim;if(!c)return;
  var prompt='You are a claims handler assistant for a London insurance market workbench. Write a concise 3-sentence narrative overview of this claim for the notes tab. Claim: '+c.id+' Insured: '+c.ins+' Class: '+c.cls+' Reserve: '+c.cur+' '+c.res.toLocaleString()+' Status: '+c.st+(c.ror?' ROR active.':'')+' Movement history: '+c.mvts.map(function(m){return m.dt+' '+m.type+' '+m.desc;}).join('; ')+' Latest notes: '+c.notes.slice(0,2).map(function(n){return n.body;}).join(' / ')+'. Be factual and professional. Do not use markdown. Maximum 3 sentences.';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(d){
    var text=d.content&&d.content[0]&&d.content[0].text?d.content[0].text:'Unable to generate summary.';
    var el2=document.getElementById('ai-thinking-text');
    if(el2){el2.textContent=text;el2.style.fontStyle='normal';el2.style.color='var(--t1)';}
  }).catch(function(){
    var el2=document.getElementById('ai-thinking-text');
    if(el2){el2.textContent=c.ins+' — '+c.cls+' claim with '+c.cur+' '+c.res.toLocaleString()+' reserve. '+c.mvts.length+' movement(s) on record. Status: '+c.st+(c.ror?' ROR is active and under legal review.':'. Progressing towards settlement.')+' Latest activity: '+c.notes[0].body.slice(0,80)+'...';el2.style.fontStyle='normal';el2.style.color='var(--t1)';}
  });
}


// ─── MOVEMENT MODAL ──────────────────────────────────────────────────────────
var _mvtLines=[];  // [{id,group,cat,origAmt,origCur,settlAmt,settlCur,payee,bankRef,paid,out,desc}]
var _mvtDesc='';
var _mvtLineIdSeq=0;

var MVT_CATS={
  indemnity:['Indemnity','Subrogation recovery','Ex-gratia','Public liability','Employers liability'],
  fees:['Loss adjuster fees','Legal fees','Survey / expert fees','Court fees','Counsel fees','Travel & expenses','Other fees']
};

function showNewMvtModal(){
  var c=claim;if(!c)return;
  _mvtLines=[];_mvtLineIdSeq=0;_mvtDesc='';
  _addMvtLine();
  _renderMvtModal(c);
}

function _addMvtLine(){
  _mvtLineIdSeq++;
  _mvtLines.push({
    id:_mvtLineIdSeq,
    group:'indemnity',cat:'Indemnity',
    origAmt:'',origCur:claim?claim.cur:'USD',
    settlAmt:'',settlCur:claim?claim.cur:'USD',
    payee:'',bankRef:'',
    paid:'',out:'',
    manualOut:false
  });
}

function _renderMvtModal(c){
  var existing=document.getElementById('mvt-modal-wrap');
  if(existing) existing.remove();
  var modal=document.createElement('div');
  modal.id='mvt-modal-wrap';
  modal.style.cssText='position:absolute;top:0;left:0;right:0;bottom:0;min-height:100vh;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto';
  modal.onclick=function(e){if(e.target===modal)closeMvtModal();};

  var payeeOpts='<option value="">Select payee...</option>'+
    '<option>'+c.ins+' (Insured)</option>'+
    '<option>'+c.broker+' (Broker)</option>'+
    (c.parties||[]).map(function(p){return '<option>'+p.n+' ('+p.r+')</option>';}).join('');
  var curOpts=['USD','GBP','EUR','CHF','JPY','AUD','CAD'].map(function(x){
    return '<option'+(x===c.cur?' selected':'')+'>'+x+'</option>';
  }).join('');

  var linesHtml=_mvtLines.map(function(ln,i){
    var isIndem=ln.group==='indemnity';
    var catOpts=MVT_CATS[ln.group].map(function(x){return '<option'+(x===ln.cat?' selected':'')+'>'+x+'</option>';}).join('');
    var outAmt=(parseFloat(ln.origAmt)||0)-(parseFloat(ln.paid)||0);
    var origAmt=parseFloat(ln.origAmt)||0;
    return '<div id="mvl-'+ln.id+'" style="background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 12px;margin-bottom:7px">'+
      '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">'+
        '<span style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0">Line '+(i+1)+'</span>'+
        '<div style="display:flex;gap:3px;flex-shrink:0">'+
          '<button class="btn sm" onclick="_setMvtGroup('+ln.id+',\'indemnity\')" style="font-size:10px;padding:2px 7px;'+(isIndem?'background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--green)':'')+'">Indemnity</button>'+
          '<button class="btn sm" onclick="_setMvtGroup('+ln.id+',\'fees\')" style="font-size:10px;padding:2px 7px;'+(!isIndem?'background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4);color:var(--blue)':'')+'">Fees</button>'+
        '</div>'+
        '<select class="fi" id="mvl-cat-'+ln.id+'" onchange="_setMvtCat('+ln.id+',this.value)" style="flex:1;padding:3px 6px;font-size:11px;height:28px">'+catOpts+'</select>'+
        (_mvtLines.length>1?'<button class="btn sm" onclick="_removeMvtLine('+ln.id+')" style="color:var(--red);flex-shrink:0;padding:2px 7px">&#x2715;</button>':'')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 60px 110px 60px 110px 1fr 1fr;gap:5px;align-items:end">'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Outstanding *</div>'+
          '<input class="fi" id="mvl-oa-'+ln.id+'" inputmode="decimal" placeholder="0.00" value="'+ln.origAmt+'" style="padding:4px 7px;font-size:12px;font-family:monospace;transition:box-shadow .4s" oninput="_mvtLineChange('+ln.id+')" onblur="_pmPaymentBlur('+ln.id+')"></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Ccy</div>'+
          '<select class="fi" id="mvl-oc-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+curOpts+'</select></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Settl amount</div>'+
          '<input class="fi" id="mvl-sa-'+ln.id+'" inputmode="decimal" placeholder="= orig" value="'+ln.settlAmt+'" style="padding:4px 7px;font-size:12px;font-family:monospace"></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Settl ccy</div>'+
          '<select class="fi" id="mvl-sc-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+curOpts+'</select></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Payment</div>'+
          '<input class="fi" id="mvl-pd-'+ln.id+'" inputmode="decimal" placeholder="0.00" value="'+ln.paid+'" style="padding:4px 7px;font-size:12px;font-family:monospace" oninput="_mvtLineChange('+ln.id+')" onblur="_pmPaymentBlur('+ln.id+')"></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Payee</div>'+
          '<select class="fi" id="mvl-py-'+ln.id+'" style="padding:4px 5px;font-size:11px">'+payeeOpts+'</select></div>'+
        '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Bank / ref</div>'+
          '<input class="fi" id="mvl-br-'+ln.id+'" placeholder="e.g. BACS ref" value="'+ln.bankRef+'" style="padding:4px 7px;font-size:11px"></div>'+
      '</div>'+
    '</div>';
  }).join('');

  var totOrig=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.origAmt)||0);},0);
  var totPaid=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.paid)||0);},0);
  var totOut=totOrig-totPaid;

  modal.innerHTML='<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;width:720px;max-width:95vw;max-height:85vh;overflow-y:auto">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
      '<div style="font-size:14px;font-weight:600;color:var(--t1)">Create manual movement</div>'+
      '<button class="btn sm" onclick="closeMvtModal()">&#x2715;</button>'+
    '</div>'+
    '<div style="margin-bottom:14px"><div class="fl">Movement description *</div>'+
      '<textarea class="fi" id="mv-desc-main" rows="2" placeholder="e.g. Interim indemnity payment — cargo damage agreed by market">'+_mvtDesc+'</textarea></div>'+
    '<div id="mvt-lines-wrap">'+linesHtml+'</div>'+
    '<button class="btn sm" onclick="_addMvtLine();_renderMvtModal(claim)" style="margin-bottom:14px">+ Add line</button>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px" id="mvt-totals-block">'+
      '<div class="sc" style="padding:8px 10px"><div class="sc-l">Total outstanding</div><div style="font-size:14px;font-family:monospace;color:var(--t1)">'+c.cur+' '+totOrig.toLocaleString()+'</div></div>'+
      '<div class="sc" style="padding:8px 10px"><div class="sc-l">Payment this movement</div><div style="font-size:14px;font-family:monospace;color:var(--green)">'+c.cur+' '+totPaid.toLocaleString()+'</div></div>'+
      '<div class="sc" style="padding:8px 10px"><div class="sc-l">Remaining outstanding</div><div style="font-size:14px;font-family:monospace;color:'+(totOut>0?'var(--amber)':'var(--green)')+'">'+c.cur+' '+totOut.toLocaleString()+'</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;border-top:1px solid var(--bdr);padding-top:12px">'+
      '<button class="btn" onclick="closeMvtModal()">Cancel</button>'+
      '<button class="btn p" onclick="saveMvt()">Save movement</button>'+
    '</div>'+
  '</div>';

  document.getElementById('app').appendChild(modal);
}

function _mvtTotalsHtml(c){
  var totOrig=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.origAmt)||0);},0);
  var totPaid=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.paid)||0);},0);
  var totOut=totOrig-totPaid;
  var cur=c?c.cur:'';
  return '<div class="sc" style="padding:8px 10px"><div class="sc-l">Total outstanding</div><div style="font-size:14px;font-family:monospace;color:var(--t1)">'+cur+' '+totOrig.toLocaleString()+'</div></div>'+
    '<div class="sc" style="padding:8px 10px"><div class="sc-l">Payment this movement</div><div style="font-size:14px;font-family:monospace;color:var(--green)">'+cur+' '+totPaid.toLocaleString()+'</div></div>'+
    '<div class="sc" style="padding:8px 10px"><div class="sc-l">Remaining outstanding</div><div style="font-size:14px;font-family:monospace;color:'+(totOut>0?'var(--amber)':'var(--green)')+'">'+cur+' '+totOut.toLocaleString()+'</div></div>';
}

function _mvtLineChange(id){
  var ln=_mvtLines.find(function(l){return l.id===id;});if(!ln)return;
  var oa=document.getElementById('mvl-oa-'+id);var pd=document.getElementById('mvl-pd-'+id);
  if(oa) ln.origAmt=oa.value;if(pd) ln.paid=pd.value;
  _pmRefreshTotals();
}

function _syncMvtLineFromDom(id){
  var ln=_mvtLines.find(function(l){return l.id===id;});if(!ln)return;
  ['oa','oc','sa','sc','pd','py','br'].forEach(function(field){
    var el=document.getElementById('mvl-'+field+'-'+id);
    if(el) ln[{oa:'origAmt',oc:'origCur',sa:'settlAmt',sc:'settlCur',pd:'paid',py:'payee',br:'bankRef'}[field]]=el.value;
  });
}

function _syncAllLinesFromDom(){
  _mvtLines.forEach(function(ln){_syncMvtLineFromDom(ln.id);});
  var descEl=document.getElementById('mv-desc-main');
  if(descEl) _mvtDesc=descEl.value;
}

function _refreshMvtTotals(){
  var wrap=document.getElementById('mvt-modal-wrap');if(!wrap)return;
  var existing=wrap.querySelector('#mvt-totals-block');
  if(existing) existing.innerHTML=_mvtTotalsHtml(claim);
}

function _setMvtGroup(id,group){
  _syncAllLinesFromDom();
  var ln=_mvtLines.find(function(l){return l.id===id;});if(!ln)return;
  ln.group=group;ln.cat=MVT_CATS[group][0];
  _renderMvtModal(claim);
}

function _setMvtCat(id,val){var ln=_mvtLines.find(function(l){return l.id===id;});if(ln)ln.cat=val;}

function _toggleManualOut(id){
  _syncAllLinesFromDom();
  var ln=_mvtLines.find(function(l){return l.id===id;});if(!ln)return;
  ln.manualOut=!ln.manualOut;
  _renderMvtModal(claim);
}

function _removeMvtLine(id){
  _syncAllLinesFromDom();
  _mvtLines=_mvtLines.filter(function(l){return l.id!==id;});
  _renderMvtModal(claim);
}

function saveMvt(){
  var c=claim;if(!c)return;
  _syncAllLinesFromDom();
  var desc=_mvtDesc.trim();
  if(!desc){notify('Please enter a movement description');return;}
  if(!_mvtLines.length){notify('Please add at least one line');return;}
  var hasAmt=_mvtLines.some(function(ln){return parseFloat(ln.origAmt)>0;});
  if(!hasAmt){notify('Please enter an amount on at least one line');return;}
  var newId='M'+(c.mvts.length+1);
  var totalOrig=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.origAmt)||0);},0);
  var totalPaid=_mvtLines.reduce(function(s,ln){return s+(parseFloat(ln.paid)||0);},0);
  var totalOut=totalOrig-totalPaid;
  var breakdown=_mvtLines.filter(function(ln){return parseFloat(ln.origAmt)>0;}).map(function(ln){
    var oa=parseFloat(ln.origAmt)||0,pd=parseFloat(ln.paid)||0;
    return {cat:ln.cat,group:ln.group,amt:oa,origCur:ln.origCur,settlCur:ln.settlCur,
      settlAmt:parseFloat(ln.settlAmt)||oa,payee:ln.payee,bankRef:ln.bankRef,paid:pd,out:oa-pd};
  });
  c.mvts.push({id:newId,dt:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    type:totalPaid>0?'payment':'reserve',cat:_mvtLines[0].cat,desc:desc,
    paid:totalPaid||null,ptd:totalPaid,out:totalOut,ecf:'',processor:'S. Williams',breakdown:breakdown});
  c.audit.unshift({t:'Just now',u:'SW',a:'Movement '+newId+' added: '+c.cur+' '+totalOrig.toLocaleString()+' outstanding, '+c.cur+' '+totalPaid.toLocaleString()+' paid. Processed by S. Williams'});
  closeMvtModal();
  notify('Movement '+newId+' saved');
  if(rtab==='movements'){document.getElementById('rtab-c').innerHTML=renderTab();setTimeout(function(){buildMC('all');},80);}
  else{document.getElementById('rtab-c').innerHTML=renderTab();}
}

function closeMvtModal(){var m=document.getElementById('mvt-modal-wrap');if(m)m.remove();}

function checkReserveSuggest(val){
  var c=claim;if(!c||!c.similarClaims||!c.similarClaims.length)return;
  var amt=parseFloat(val);if(isNaN(amt))return;
  var avgRes=Math.round(c.similarClaims.reduce(function(s,x){return s+x.res;},0)/c.similarClaims.length);
  var pct=Math.round(Math.abs(amt-avgRes)/avgRes*100);
  var warn=document.getElementById('reserve-warn');if(!warn)return;
  warn.innerHTML=pct>20?
    '<div style="padding:8px 10px;background:var(--amber-d);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);font-size:11px;color:var(--amber)">&#x26A0; Reserve is '+pct+'% '+(amt>avgRes?'above':'below')+' average for similar '+c.cls+' claims ('+c.cur+' '+avgRes.toLocaleString()+')</div>':
    '<div style="padding:8px 10px;background:var(--green-d);border:1px solid rgba(16,185,129,.3);border-radius:var(--r);font-size:11px;color:var(--green)">&#x2713; Within range of similar claims (avg '+c.cur+' '+avgRes.toLocaleString()+')</div>';
}

// Delegated click listener for action queue rows
document.addEventListener('click', function(e){
  var row = e.target.closest('.arow[data-aqi]');
  if(!row) return;
  var idx = parseInt(row.getAttribute('data-aqi'), 10);
  var a = window._actionQueue && window._actionQueue[idx];
  if(!a) return;
  if(!a.actionType || a.actionType === 'view') {
    openClaim(a.id);
  } else {
    openClaimFromAction(a.id, a.actionType, a.mvt, a);
  }
});

function notify(msg){
  var n=document.getElementById('notif');
  if(!n){n=document.createElement('div');n.id='notif';n.className='notif';document.body.appendChild(n);}
  n.textContent=msg;n.style.display='block';
  clearTimeout(window._nt);
  window._nt=setTimeout(function(){n.style.display='none';},3400);
}

function scrollAndFlash(){
  var app=document.getElementById('app');
  if(app) app.scrollTop=0;
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(function(){
    var content=document.getElementById('content');
    if(content) content.scrollTop=0;
    var activeStep=document.querySelector('.tl-step.active');
    if(activeStep){
      var tasks=activeStep.querySelector('.tl-step-tasks');
      if(tasks&&!tasks.classList.contains('open')) tasks.classList.add('open');
      var taskItems=activeStep.querySelectorAll('.tl-task-item');
      if(taskItems&&taskItems.length){
        var lastTask=taskItems[taskItems.length-1];
        lastTask.classList.add('tl-task-flash');
        setTimeout(function(){lastTask.classList.remove('tl-task-flash');},2500);
      }
    }
  },150);
}

function requestAuthority(claimId,ref,ins,cls,type,desc,cur,amount){
  pendingAuthorityRequests.push({
    claimId:claimId,mvt:(pendingAction?pendingAction.mvt:'M?'),
    ref:ref,ins:ins,cls:cls,type:type,desc:desc,cur:cur,amount:amount,
    user:'P. Richards',role:'Senior Claims Manager',
    since:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
    overdue:false
  });
  var c=CL.find(function(x){return x.id===claimId;});
  if(c) c.audit.unshift({t:'Just now',u:'SW',a:'Authority requested for '+cur+' '+Number(amount).toLocaleString()+' — with P. Richards (Senior Claims Manager)'});
  if(pendingAction) pendingAction.awaitingAuthority=true;
  go('claim');
  notify('Authority request sent to P. Richards');
}

function buildFC(filter){
  try {
    var canvas=document.getElementById('fc-chart');
    if(!canvas||!window.Chart) return;
    if(chartFC){chartFC.destroy();chartFC=null;}
    var c2=claim; if(!c2) return;
    var mvts=c2.mvts.filter(function(m){return m.out!=null||m.paid;});
    if(!mvts.length) return;
    var labels=mvts.map(function(m){return m.id;});
    var datasets=[
      {label:'Reserve',data:mvts.map(function(m){return m.out||0;}),backgroundColor:'rgba(245,158,11,0.7)',borderRadius:3},
      {label:'Paid',data:mvts.map(function(m){return m.paid||0;}),backgroundColor:'rgba(16,185,129,0.7)',borderRadius:3}
    ];
    if(filter==='indemnity') datasets=datasets.map(function(d){return Object.assign({},d,{data:d.data});});
    chartFC=new Chart(canvas,{type:'bar',data:{labels:labels,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},color:'#94a3b8',boxWidth:10}}},
        scales:{x:{ticks:{color:'#64748b',font:{size:10}}},y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:10}}}}}});
  } catch(e){console.log('buildFC error:',e.message);}
}

function buildMC(filter){
  try {
    var canvas=document.getElementById('mc-chart');
    if(!canvas||!window.Chart) return;
    if(chartMC){chartMC.destroy();chartMC=null;}
    var c2=claim; if(!c2) return;
    var mvts=c2.mvts.slice().reverse();
    if(!mvts.length) return;
    chartMC=new Chart(canvas,{type:'line',data:{
      labels:mvts.map(function(m){return m.id+' '+m.dt.slice(0,6);}),
      datasets:[
        {label:'Outstanding',data:mvts.map(function(m){return m.out||0;}),borderColor:'rgba(245,158,11,0.9)',backgroundColor:'rgba(245,158,11,0.1)',fill:true,tension:0.3,pointRadius:3},
        {label:'Paid',data:mvts.map(function(m){return m.paid||0;}),borderColor:'rgba(16,185,129,0.9)',backgroundColor:'rgba(16,185,129,0.08)',fill:true,tension:0.3,pointRadius:3}
      ]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},color:'#94a3b8',boxWidth:10}}},
      scales:{x:{ticks:{color:'#64748b',font:{size:10}}},y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:10}}}}}});
  } catch(e){console.log('buildMC error:',e.message);}
}

function setFC(filter){buildFC(filter);}
function setMC(filter){buildMC(filter);}

function toggleROR(){
  if(!claim)return;
  claim.ror=!claim.ror;
  claim.audit.unshift({t:'Just now',u:'SW',a:claim.ror?'Reservation of Rights added':'Reservation of Rights removed'});
  notify(claim.ror?'ROR activated':'ROR removed');
  go('claim');
}

function toggleSt(){
  if(!claim)return;
  var cycle={open:'closed',closed:'open',review:'open'};
  claim.st=cycle[claim.st]||'open';
  claim.audit.unshift({t:'Just now',u:'SW',a:'Claim status changed to '+claim.st});
  notify('Status updated to: '+claim.st);
  go('claim');
}

function showRawMsg(mvtId, msgIdx){
  if(!claim||!claim.ecfm) return;
  var grp=claim.ecfm.find(function(g){return g.mvtId===mvtId;});
  if(!grp||!grp.messages||!grp.messages[msgIdx]) return;
  var msg=grp.messages[msgIdx];
  showRawMessage(msg,grp);
}

function showRawMessage(msg,grp){
  // Remove existing modal if any
  var existing=document.getElementById('raw-msg-modal');
  if(existing) existing.remove();

  // Build a fake raw ACORD4ALL / ECF2 message envelope
  var now=msg.date||'—';
  var ucr=(typeof claim!=='undefined'&&claim&&claim.ecfm)?
    (grp||{ucr:'—'}).ucr:'—';

  var rawLines=[
    '=== ECF2 / ACORD4ALL MESSAGE ENVELOPE ===',
    '',
    'Message-ID:       ECF2-'+Math.random().toString(36).slice(2,10).toUpperCase(),
    'Timestamp:        '+now+' UTC',
    'Protocol:         ACORD 4ALL v2.0 / ECF2 Velonetic',
    'Message-Type:     '+msg.type+(msg.subtype?' ('+msg.subtype+')':''),
    'ACORD-Type:       '+(msg.acordType||'—'),
    'From:             '+(msg.from||'—'),
    'To:               ClaimsBench / S. Williams',
    'UCR:              '+ucr,
    'Status-Code:      '+msg.statusCode,
    '',
    '--- CLAIM IDENTIFICATION ---',
    'Claim-Ref:        '+(typeof claim!=='undefined'&&claim?claim.id:'—'),
    'Bureau-Ref:       '+(typeof claim!=='undefined'&&claim?claim.ref:'—'),
    'Insured:          '+(typeof claim!=='undefined'&&claim?claim.ins:'—'),
    'Class:            '+(typeof claim!=='undefined'&&claim?claim.cls:'—'),
    'LOA:              '+(typeof claim!=='undefined'&&claim?claim.loa:'—'),
    '',
    '--- MESSAGE BODY ---',
    msg.detail,
    '',
    (msg.amount?'--- FINANCIAL ---\nAmount:           '+(typeof claim!=='undefined'&&claim?claim.cur:'') +' '+Number(msg.amount).toLocaleString()+'\nCurrency:         '+(typeof claim!=='undefined'&&claim?claim.cur:'—'):''),
    '',
    '--- TRANSMISSION LOG ---',
    'Received-By:      Velonetic ECF2 Gateway',
    'Forwarded-To:     ClaimsBench API',
    'Processing-Time:  '+Math.floor(Math.random()*80+20)+'ms',
    'Checksum:         SHA256:'+Math.random().toString(36).slice(2,18).toUpperCase(),
    '',
    '=== END OF MESSAGE ==='
  ].filter(function(l){return l!==null&&l!==undefined;}).join('\n');

  var modal=document.createElement('div');
  modal.id='raw-msg-modal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:30px';
  modal.onclick=function(e){if(e.target===modal)modal.remove();};

  modal.innerHTML=
    '<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);width:100%;max-width:720px;max-height:80vh;display:flex;flex-direction:column">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0">'+
        '<div>'+
          '<div style="font-size:13px;font-weight:600;color:var(--t1)">Raw message data</div>'+
          '<div style="font-size:11px;color:var(--t3);margin-top:2px">'+msg.type+' · '+(msg.acordType||'—')+' · '+now+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:8px;align-items:center">'+
          '<button class="btn sm" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById(\'raw-pre\').textContent).then(function(){notify(\'Copied to clipboard\');})">Copy</button>'+
          '<button class="btn sm" onclick="document.getElementById(\'raw-msg-modal\').remove()">&#x2715;</button>'+
        '</div>'+
      '</div>'+
      '<div style="overflow-y:auto;padding:16px">'+
        '<pre id="raw-pre" style="font-family:monospace;font-size:11px;color:var(--t2);line-height:1.7;white-space:pre-wrap;margin:0;background:var(--bg4);border:1px solid var(--bdr);border-radius:var(--r);padding:14px">'+rawLines+'</pre>'+
      '</div>'+
    '</div>';

  document.body.appendChild(modal);
}


go('dashboard');
